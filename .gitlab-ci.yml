stages:
  - lint
  - deploy

# ─── HTML ───────────────────────────────────────────────
lint-html:
  stage: lint
  script:
    - htmlhint "**/*.html" --config .htmlhintrc
  rules:
    - changes:
        - "**/*.html"

# ─── JSON ───────────────────────────────────────────────
lint-json:
  stage: lint
  script:
    - find . -name "*.json" -not -path "./node_modules/*" | xargs jsonlint -q
  rules:
    - changes:
        - "**/*.json"

# ─── CSS ────────────────────────────────────────────────
lint-css:
  stage: lint
  script:
    - stylelint "**/*.css" --config .stylelintrc.json
  rules:
    - changes:
        - "**/*.css"

# ─── YAML ───────────────────────────────────────────────
lint-yaml:
  stage: lint
  script:
    - yamllint -c .yamllint.yml .
  rules:
    - changes:
        - "**/*.yml"
        - "**/*.yaml"

# ─── PYTHON ─────────────────────────────────────────────
lint-python:
  stage: lint
  script:
    - pip install flake8 pylint
    - flake8 . --max-line-length=120 --exclude=.git,node_modules
    - find . -name "*.py" -not -path "./node_modules/*" | xargs pylint --fail-under=7
  rules:
    - changes:
        - "**/*.py"

# ─── TERRAFORM ──────────────────────────────────────────
lint-terraform:
  stage: lint
  script:
    - find . -name "*.tf" -exec dirname {} \; | sort -u | while read dir; do
        echo "Validating $dir";
        cd $dir && terraform init -backend=false && terraform validate;
        cd -;
      done
  rules:
    - changes:
        - "**/*.tf"

# ─── DOCKERFILE ─────────────────────────────────────────
lint-docker:
  stage: lint
  script:
    - find . -name "Dockerfile*" | xargs hadolint
  rules:
    - changes:
        - "**/Dockerfile*"

# ─── KUBERNETES ─────────────────────────────────────────
lint-kubernetes:
  stage: lint
  script:
    - pip install kubeval
    - find . -name "*.yaml" -path "*/k8s/*" | xargs kubeval
  rules:
    - changes:
        - "**/k8s/**/*.yaml"
        - "**/k8s/**/*.yml"

# ─── BASH ───────────────────────────────────────────────
lint-bash:
  stage: lint
  script:
    - find . -name "*.sh" | xargs shellcheck
  rules:
    - changes:
        - "**/*.sh"

# ─── DEPLOY ─────────────────────────────────────────────
deploy-site:
  stage: deploy
  script:
    - echo "Déploiement du site en cours..."
    - rsync -av --delete $CI_PROJECT_DIR/ /srv/site-formation/
    - echo "Déploiement terminé !"
  only:
    - main
