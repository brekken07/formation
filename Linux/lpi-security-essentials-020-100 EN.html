<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>LPI Security Essentials 020-100 — Exam Prep</title>
  <link rel="icon" type="image/svg+xml" href="../devcorp/favicon.svg">
  <link rel="icon" type="image/png" sizes="512x512" href="../devcorp/favicon-512.png">
  <link rel="shortcut icon" href="../devcorp/favicon.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0a0d12;--bg2:#0f1318;--bg3:#141920;--border:#1e2730;--border2:#2a3545;
    --text:#c8d8e8;--text-dim:#6a8090;--text-bright:#e8f4ff;
    --accent:#00c8ff;--accent2:#0090cc;--green:#00e890;--red:#ff4060;--orange:#ffaa00;
    --d021:#00c8ff;--d022:#bb80ff;--d023:#00e890;--d024:#ffaa00;--d025:#ff6688;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .container{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:1}
  header{text-align:center;padding:40px 20px 30px;border-bottom:1px solid var(--border);margin-bottom:30px}
  .logo-line{font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;opacity:.8}
  h1{font-family:'Rajdhani',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--text-bright);letter-spacing:2px;text-transform:uppercase}
  h1 span{color:var(--accent)}
  .exam-meta{display:flex;justify-content:center;gap:30px;margin-top:18px;flex-wrap:wrap}
  .meta-item{font-size:11px;color:var(--text-dim);letter-spacing:1px}
  .meta-item strong{color:var(--accent)}
  .domain-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
  .domain-tag{font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:2px;font-weight:600;border:1px solid currentColor;opacity:.75}
  .d021{color:var(--d021)}.d022{color:var(--d022)}.d023{color:var(--d023)}.d024{color:var(--d024)}.d025{color:var(--d025)}
  #quiz-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:40px}
  .quiz-card{border:1px solid var(--border);background:var(--bg2);padding:20px;border-radius:4px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .2s}
  .quiz-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
  .quiz-card:hover::before{opacity:1}
  .quiz-card h3{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;color:var(--text-bright);margin-bottom:6px}
  .quiz-card p{font-size:11px;color:var(--text-dim);line-height:1.6}
  .card-badge{display:inline-block;font-size:10px;padding:2px 8px;border:1px solid var(--border2);color:var(--text-dim);margin-top:10px;border-radius:2px}
  .score-badge{position:absolute;top:12px;right:12px;font-size:10px;padding:2px 8px;border-radius:2px;font-weight:600}
  .score-pass{background:rgba(0,232,144,.15);color:var(--green);border:1px solid var(--green)}
  .score-fail{background:rgba(255,64,96,.15);color:var(--red);border:1px solid var(--red)}
  .progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .progress-bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .3s}
  .progress-text{font-size:11px;color:var(--text-dim);min-width:70px;text-align:right}
  .timer-wrap{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim)}
  .timer-clock{font-size:1.1rem;font-weight:700;color:var(--accent);min-width:56px;text-align:center;padding:4px 8px;border:1px solid var(--border2);border-radius:3px;background:var(--bg2)}
  .timer-clock.warning{color:var(--orange);border-color:var(--orange)}
  .timer-clock.danger{color:var(--red);border-color:var(--red);animation:blink .8s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
  .top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px}
  .q-domain{font-size:10px;letter-spacing:2px;font-weight:600;padding:3px 10px;border-radius:2px;border:1px solid currentColor;display:inline-block;margin-bottom:14px}
  .q-num{font-size:11px;color:var(--text-dim);margin-bottom:8px}
  .q-text{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:500;color:var(--text-bright);line-height:1.6;margin-bottom:20px}
  .q-multi-hint{font-size:10px;color:var(--orange);letter-spacing:1px;margin-bottom:14px;padding:4px 10px;border:1px solid rgba(255,170,0,.3);background:rgba(255,170,0,.05);border-radius:2px;display:inline-block}
  .options{display:flex;flex-direction:column;gap:10px}
  .option{padding:12px 16px;border:1px solid var(--border);background:var(--bg2);border-radius:3px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;font-size:.95rem;line-height:1.5}
  .option:hover{border-color:var(--accent2);background:var(--bg3)}
  .option.selected{border-color:var(--accent);background:rgba(0,200,255,.07)}
  .option.correct{border-color:var(--green);background:rgba(0,232,144,.07);color:var(--green)}
  .option.wrong{border-color:var(--red);background:rgba(255,64,96,.07);color:var(--red)}
  .option.missed{border-color:var(--green);background:rgba(0,232,144,.05)}
  .opt-key{font-size:10px;font-weight:700;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid currentColor;border-radius:2px;margin-top:1px;opacity:.7;flex-shrink:0}
  .explanation{margin-top:18px;padding:14px 16px;border-left:3px solid var(--accent2);background:rgba(0,144,204,.06);font-size:.9rem;line-height:1.7;color:var(--text-dim);border-radius:0 3px 3px 0;display:none}
  .explanation.show{display:block}
  .explanation strong{color:var(--text)}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:10px 24px;border-radius:3px;border:1px solid var(--accent2);color:var(--accent);background:rgba(0,200,255,.05);cursor:pointer;transition:all .2s}
  .btn:hover{background:rgba(0,200,255,.12);border-color:var(--accent)}
  .btn-green{border-color:var(--green);color:var(--green);background:rgba(0,232,144,.05)}
  .btn-green:hover{background:rgba(0,232,144,.12)}
  .btn-red{border-color:var(--red);color:var(--red);background:rgba(255,64,96,.05)}
  .btn-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
  .score-circle{width:140px;height:140px;border-radius:50%;border:3px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;position:relative}
  .score-circle::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(var(--accent) var(--score-pct),var(--border) 0);z-index:-1}
  .score-val{font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;color:var(--text-bright)}
  .score-label{font-size:10px;color:var(--text-dim);letter-spacing:2px}
  .result-verdict{text-align:center;margin-bottom:30px}
  .verdict-badge{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:3px;padding:8px 28px;border-radius:3px;display:inline-block}
  .verdict-pass{border:2px solid var(--green);color:var(--green);background:rgba(0,232,144,.08)}
  .verdict-fail{border:2px solid var(--red);color:var(--red);background:rgba(255,64,96,.08)}
  .result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
  .stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:14px;text-align:center}
  .stat-val{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:var(--text-bright)}
  .stat-lbl{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:4px}
  .domain-breakdown{margin-bottom:28px}
  .domain-breakdown h3{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
  .db-row{display:grid;grid-template-columns:220px 1fr 50px;align-items:center;gap:12px;margin-bottom:8px}
  .db-label{font-size:11px}
  .db-bar-track{background:var(--border);height:6px;border-radius:3px;overflow:hidden}
  .db-bar-fill{height:100%;border-radius:3px}
  .db-pct{font-size:11px;text-align:right;font-weight:600}
  .review-item{border:1px solid var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden}
  .review-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--bg2);transition:background .15s}
  .review-header:hover{background:var(--bg3)}
  .review-icon{font-size:14px;flex-shrink:0}
  .review-q-text{font-size:12px;flex:1;line-height:1.4}
  .review-body{padding:14px 16px;background:var(--bg);display:none;font-size:12px}
  .review-body.open{display:block}
  .hidden{display:none!important}
  #results{display:none}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo-line">Linux Professional Institute</div>
  <h1>Security <span>Essentials</span></h1>
  <div class="exam-meta">
    <div class="meta-item">Exam Code: <strong>020-100</strong></div>
    <div class="meta-item">Questions: <strong>40</strong></div>
    <div class="meta-item">Duration: <strong>60 min</strong></div>
    <div class="meta-item">Passing score: <strong>500 / 800</strong></div>
  </div>
</header>

<div id="home">
  <div class="domain-legend">
    <span class="domain-tag d021">021 Security Concepts</span>
    <span class="domain-tag d022">022 Encryption</span>
    <span class="domain-tag d023">023 Device &amp; Storage Security</span>
    <span class="domain-tag d024">024 Network &amp; Service Security</span>
    <span class="domain-tag d025">025 Identity &amp; Privacy</span>
  </div>
  <div id="quiz-select"></div>
</div>

<div id="quiz" class="hidden">
  <div class="top-bar">
    <div class="progress-wrap" style="flex:1;min-width:200px">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-text" id="prog-text">1 / 40</div>
    </div>
    <div class="timer-wrap">
      <span style="font-size:10px;letter-spacing:1px;color:var(--text-dim)">TIME</span>
      <div class="timer-clock" id="timer-display">60:00</div>
    </div>
  </div>
  <div id="q-container"></div>
  <div class="btn-actions">
    <button class="btn" id="btn-check" onclick="checkAnswer()">Submit Answer</button>
    <button class="btn" id="btn-next" onclick="nextQuestion()" style="display:none">Next →</button>
    <button class="btn btn-red" onclick="endQuiz()" style="margin-left:auto;font-size:11px">End Exam</button>
  </div>
</div>

<div id="results"></div>
</div>

<script>
const QUIZZES=[
{
title:"Quiz 1 — Security Concepts & Encryption",
desc:"CIA triad, roles & actors, risk management, cryptographic fundamentals, PKI, TLS/HTTPS, email and storage encryption.",
questions:[
{q:"Which security property ensures that information has not been altered in an unauthorized manner?",opts:["Confidentiality","Availability","Integrity","Non-repudiation"],ans:[2],exp:"Integrity ensures data remains accurate and unmodified. Confidentiality restricts unauthorized access, availability ensures legitimate access, and non-repudiation prevents denial of actions."},
{q:"Which term describes a security professional who tests systems with the owner's explicit authorization?",opts:["Black hat hacker","Script kiddie","White hat hacker","Cracker"],ans:[2],exp:"A white hat hacker performs authorized security testing (penetration testing, vulnerability assessments) to help organizations improve defenses. Black hats act without authorization and for malicious purposes."},
{q:"What does CVE stand for in the context of security vulnerabilities?",opts:["Common Vulnerability Enumeration","Critical Vulnerability Exploit","Common Vulnerabilities and Exposures","Certified Vulnerability Evaluation"],ans:[2],exp:"CVE (Common Vulnerabilities and Exposures) is a public dictionary assigning a unique identifier to each known security flaw, enabling consistent communication across tools and security advisories."},
{q:"In risk management, what does 'risk mitigation' mean?",opts:["Ignoring a risk due to budget constraints","Completely transferring risk to a third party","Implementing controls that reduce the likelihood or impact of a risk","Accepting the risk without any action"],ans:[2],exp:"Mitigation applies safeguards to reduce either the probability of a threat materializing or the damage it would cause. Other options include acceptance, avoidance, and transfer."},
{q:"What is 'responsible disclosure' in security research?",opts:["Publishing a vulnerability immediately on social media","Selling the vulnerability to the highest bidder","Privately notifying the vendor and allowing time to patch before public disclosure","Exploiting the vulnerability to demonstrate its severity"],ans:[2],exp:"Responsible disclosure means informing the affected vendor privately, giving a reasonable window (typically 90 days) to release a fix, and then publishing details. It balances researcher transparency with user protection."},
{q:"Which hashing algorithm is considered cryptographically broken and must not be used for security?",opts:["SHA-256","SHA-3","MD5","bcrypt"],ans:[2],exp:"MD5 was shown to be vulnerable to collision attacks in 2004 and must not be used for password storage, digital signatures, or integrity verification. SHA-256, SHA-3, and bcrypt remain secure for their intended purposes."},
{q:"What is the role of a Certificate Authority (CA) in a Public Key Infrastructure?",opts:["A high-speed DNS resolver","A trusted entity that issues and digitally signs X.509 certificates","An asymmetric encryption algorithm","An application-layer firewall"],ans:[1],exp:"A CA verifies the identity of certificate applicants and issues digitally signed certificates. Recipients trust these certificates because they trust the CA's root certificate preinstalled in their browser or OS."},
{q:"In asymmetric encryption, which key is used to encrypt a message intended for a specific recipient?",opts:["The recipient's private key","The recipient's public key","The sender's private key","A shared symmetric session key"],ans:[1],exp:"To encrypt a message for a recipient, use their public key. Only their private key (which they keep secret) can decrypt it. This solves the key distribution problem of symmetric encryption."},
{q:"What does a web browser verify when establishing an HTTPS connection?",opts:["The server's processing speed","The validity and trustworthiness of the server's TLS certificate","The presence of a web application firewall","The server's operating system version"],ans:[1],exp:"The browser checks that the certificate is signed by a trusted CA, has not expired, and that the domain name matches. A mismatch triggers a security warning and should prevent the connection."},
{q:"Which versions of TLS are considered obsolete and insecure? (Choose TWO)",opts:["TLS 1.3","TLS 1.2","TLS 1.1","TLS 1.0"],ans:[2,3],multi:true,exp:"TLS 1.0 and 1.1 were deprecated by RFC 8996 in 2021. Both are vulnerable to downgrade attacks and known weaknesses. TLS 1.2 is still acceptable with proper configuration; TLS 1.3 is the recommended standard."},
{q:"Which protocol allows end-to-end encrypted email without relying on a centralized certificate authority?",opts:["S/MIME with enterprise PKI","OpenPGP / GnuPG","SMTP over TLS only","DKIM"],ans:[1],exp:"OpenPGP (implemented by GnuPG) uses a decentralized 'web of trust'. S/MIME relies on a CA-based PKI. TLS encrypts only the transport layer, not the message content. DKIM is an anti-spoofing signature mechanism."},
{q:"Which Linux command-line tool is used to encrypt, decrypt, and sign files using OpenPGP?",opts:["openssl enc","gpg","ssh-keygen","cryptsetup"],ans:[1],exp:"gpg (GNU Privacy Guard) is the open-source OpenPGP implementation. It encrypts and decrypts files and messages, creates digital signatures, and manages public/private key pairs."},
{q:"Which Linux technology provides full-disk encryption at the block device level?",opts:["eCryptfs","LUKS (Linux Unified Key Setup)","AppArmor","dm-crypt without LUKS headers"],ans:[1],exp:"LUKS is the Linux standard for block-device encryption. It builds on dm-crypt and adds key management with up to 8 key slots, metadata headers, and consistent on-disk format across distributions."},
{q:"What does TPM stand for in the context of hardware security?",opts:["Trusted Platform Module","Terminal Port Manager","Transport Protocol Module","Timed Process Monitor"],ans:[0],exp:"A Trusted Platform Module (TPM) is a dedicated security chip that generates and stores cryptographic keys, measures boot integrity (attestation), and protects secrets from software attacks and physical tampering."},
{q:"What specific security risk is associated with connecting unknown USB devices?",opts:["Risk of electrical surge only","HID injection attacks (BadUSB) and malware delivery","USB controller hardware failure","Driver incompatibility only"],ans:[1],exp:"BadUSB reprograms USB firmware so the device impersonates a keyboard and injects malicious commands. USB drives can also deliver malware via file execution. Never plug in unknown USB devices."},
{q:"Which malware type propagates automatically across networks without any user interaction?",opts:["Trojan horse","Worm","Spyware","Adware"],ans:[1],exp:"A worm self-replicates autonomously by exploiting network vulnerabilities, consuming bandwidth and system resources. Trojans require user execution. Spyware collects data silently without self-propagation."},
{q:"What is ransomware?",opts:["Software that displays unwanted advertisements","Malware that encrypts victim data and demands payment for the decryption key","A program that steals credentials in the background","A rootkit hidden inside firmware"],ans:[1],exp:"Ransomware encrypts victim files and demands ransom (typically cryptocurrency) for the decryption key. Modern ransomware also targets backups and exfiltrates data to increase leverage (double extortion)."},
{q:"What does the 3-2-1 backup rule specify?",opts:["3 weekly, 2 monthly, 1 annual backup","3 copies of data on 2 different media types with 1 copy stored off-site","Back up every 3 hours twice daily and once at night","3 disks in RAID 2 with 1 additional backup"],ans:[1],exp:"The 3-2-1 rule is a universally recommended strategy: 3 copies (1 primary + 2 backups), on 2 different storage media types (e.g., disk and cloud), with at least 1 off-site copy to survive local disasters."},
{q:"Which Linux command displays active network connections and ports currently in LISTEN state?",opts:["ifconfig -a","ss -tuln","route -n","ip link show"],ans:[1],exp:"'ss -tuln' lists TCP (-t) and UDP (-u) sockets in listening (-l) state without DNS resolution (-n). It is the modern replacement for 'netstat -tuln' and is essential for auditing exposed services."},
{q:"What is a VPN (Virtual Private Network)?",opts:["A secured wireless local area network","An encrypted tunnel for securely connecting remote users or networks over untrusted infrastructure","A secure BGP routing protocol","A next-generation stateful firewall"],ans:[1],exp:"A VPN creates an encrypted tunnel protecting communications over untrusted networks (such as public Wi-Fi) and enabling secure remote access to corporate resources from outside the perimeter."},
{q:"Which attack type floods a target service with requests to render it unavailable to legitimate users?",opts:["Man-in-the-Middle (MitM)","SQL Injection","Denial of Service (DoS) / DDoS","Phishing"],ans:[2],exp:"DoS/DDoS attacks target availability. DDoS (Distributed) uses a botnet of many machines to amplify the attack, making source-based blocking ineffective. Rate limiting, CDNs, and DDoS scrubbing services help mitigate them."},
{q:"What does a 'stateful inspection' firewall do that a basic packet filter cannot?",opts:["It inspects only IP headers","It maintains a connection state table and allows legitimate return traffic automatically","It proxies all application-layer connections","It functions as a signature-based intrusion detection system"],ans:[1],exp:"A stateful firewall tracks the state of TCP/UDP connections. Return traffic for established connections is allowed automatically without an explicit inbound rule, unlike simpler static packet filters."},
{q:"Which anonymization technique does the Tor network rely upon?",opts:["End-to-end encryption with one shared key","Onion routing: layered encryption through multiple independent relays","Traditional VPN with IP masking","A transparent HTTP proxy"],ans:[1],exp:"Tor wraps data in multiple encryption layers. Each relay decrypts one layer and forwards it—knowing only the previous and next hop. No single relay knows both the source and destination of the traffic."},
{q:"What is two-factor authentication (2FA)?",opts:["Using two different passwords for the same account","Combining two authentication factors from different categories","Encrypting authentication data twice","Using two different hashing algorithms"],ans:[1],exp:"2FA requires two factors from distinct categories: something you know (password/PIN), something you have (hardware token, phone), or something you are (biometrics). Two passwords are both 'knowledge' and do not constitute 2FA."},
{q:"What is the main security risk of reusing the same password across multiple services?",opts:["The hash becomes easier to crack","A breach on one service exposes all accounts using that password (credential stuffing)","The password expires faster","Network performance degrades"],ans:[1],exp:"Credential stuffing uses automated tools to test stolen login/password pairs from one breach against other services, exploiting password reuse. Use a unique password for every account."},
{q:"What is phishing?",opts:["A network brute-force attack","A social engineering attack that impersonates a trusted entity to steal credentials or trigger malicious actions","A self-propagating network worm","A code injection attack on web applications"],ans:[1],exp:"Phishing impersonates trusted entities (banks, IT support, online services) via email, SMS, or phone to trick users into revealing credentials, clicking malicious links, or transferring funds."},
{q:"What is a data breach?",opts:["A memory leak in application code","The unauthorized disclosure of sensitive information to external parties","A type of DDoS attack targeting data centers","A file system corruption error"],ans:[1],exp:"A data breach is the unauthorized exposure of confidential data. It may result from external attacks, insider threats, or misconfiguration. Many jurisdictions (GDPR, CCPA) require notification within defined timeframes."},
{q:"Which right is explicitly granted by GDPR (General Data Protection Regulation)?",opts:["The right to monitor employees without restriction","The right to erasure ('right to be forgotten')","The obligation to retain all personal data for 10 years","Exemption from compliance for small businesses"],ans:[1],exp:"GDPR grants data subjects several rights: access, rectification, erasure, portability, objection, and restriction of processing. The right to erasure requires organizations to delete personal data upon request under certain conditions."},
{q:"Under GDPR, which of the following is considered personal data?",opts:["The name of an open-source software package","An IP address that can be linked to an identifiable person","Technical server documentation","An operating system version number"],ans:[1],exp:"Under GDPR, personal data is any information that can directly or indirectly identify a natural person. IP addresses are personal data when linkable to an individual via ISP records or other means."},
{q:"What is the purpose of a root CA certificate in a PKI?",opts:["To encrypt all data in transit","To serve as the ultimate trust anchor from which the entire certificate chain is validated","To manage real-time certificate revocations via OCSP","To generate cryptographic key pairs for end users"],ans:[1],exp:"The root CA certificate is self-signed and sits at the top of the PKI hierarchy. It is pre-installed in browsers and operating systems as a trust anchor. All certificate chains trace back to a trusted root."},
{q:"What is the purpose of a Certificate Revocation List (CRL)?",opts:["To speed up TLS handshakes","To publish certificates revoked before their expiration date","To issue new certificates automatically","To encrypt communication between CAs"],ans:[1],exp:"A CRL lists the serial numbers of certificates revoked by the CA before their natural expiry. OCSP is the more modern and efficient alternative, enabling real-time per-certificate status checks."},
{q:"Which symmetric encryption algorithm is the current NIST-recommended standard?",opts:["DES","3DES","AES (Advanced Encryption Standard)","RC4"],ans:[2],exp:"AES has been the NIST standard symmetric cipher since 2001. DES and 3DES are deprecated. RC4 is broken. AES-256-GCM or AES-256-CBC are the recommended configurations for strong symmetric encryption."},
{q:"Which attack places the attacker between two communicating parties to intercept or modify traffic?",opts:["Denial of Service","SQL Injection","Man-in-the-Middle (MitM)","Ransomware deployment"],ans:[2],exp:"A MitM attack intercepts communications between parties without their knowledge. HTTPS with proper certificate validation, VPNs, and certificate pinning defend against MitM attacks."},
{q:"What is a rootkit?",opts:["A shell script used to configure the root account","Malware that conceals its presence and that of other malicious software at a deep system level","A standard Linux administration utility","A ransomware variant targeting only the /root directory"],ans:[1],exp:"A rootkit installs itself at the kernel or OS level to hide processes, files, and network connections. Detection requires offline scanning, integrity checkers like AIDE or Tripwire, or memory forensics tools."},
{q:"Which TWO practices reduce the attack surface of a Linux system?",opts:["Disabling unused services and daemons","Using the root account for all daily administrative tasks","Applying security patches and updates regularly","Opening all firewall ports to maximize connectivity"],ans:[0,2],multi:true,exp:"Disabling unnecessary services removes potential entry points; regular patching eliminates known exploitable vulnerabilities. Running as root and opening all ports significantly increase risk and expand the attack surface."},
{q:"What does end-to-end encryption (E2EE) guarantee in a messaging application?",opts:["Encryption applied only on the destination server","Only the sender and recipient can read the message; the server cannot decrypt content","TLS encryption between two mail servers","Disk encryption on the service provider's server"],ans:[1],exp:"E2EE ensures messages are encrypted client-side before transmission and decrypted only by the intended recipient. The service provider's servers relay ciphertext they cannot read."},
{q:"What is the 'principle of least privilege'?",opts:["All users should have administrator rights by default","Each user or process should hold only the minimum rights strictly necessary for its function","Privileges are managed exclusively by the firewall","Privileges should be distributed equally among all users"],ans:[1],exp:"The principle of least privilege (PoLP) limits access rights to the minimum required. This contains the blast radius of a compromised account or process and is a foundational security design principle."},
{q:"Which tool category securely stores and manages credentials for multiple services?",opts:["A plaintext file protected with rot13 encoding","A password manager (e.g., KeePass, Bitwarden, 1Password)","The /etc/passwd file","A web browser without a master password configured"],ans:[1],exp:"A password manager encrypts all credentials with a single strong master key, enabling use of long, unique, random passwords for every service without requiring memorization."},
{q:"Which protocols provide encrypted file transfer, replacing plain FTP? (Choose ONE best answer)",opts:["FTPS (FTP over TLS) and SFTP are both acceptable replacements","Telnet with compression","TFTP over IPv6","rsh with public key authentication"],ans:[0],exp:"FTPS wraps FTP in TLS; SFTP (SSH File Transfer Protocol) is a separate secure protocol built on SSH. Both encrypt credentials and data. Plain FTP, Telnet, TFTP, and rsh transmit everything in cleartext."},
{q:"What security technique uses network segmentation to isolate zones and limit lateral movement after a breach?",opts:["Network Address Translation (NAT)","VLANs and network segmentation","Network bridging","Link aggregation (bonding)"],ans:[1],exp:"Network segmentation divides infrastructure into isolated zones (DMZ, internal LAN, server segment). If one zone is compromised, firewall rules prevent the attacker from easily pivoting to other zones."},
{q:"What is HTTP Strict Transport Security (HSTS)?",opts:["A web content caching protocol","A response header instructing browsers to connect only via HTTPS for a given domain","A type of self-signed server certificate","A passive network traffic analysis tool"],ans:[1],exp:"HSTS (RFC 6797) tells the browser to always use HTTPS for a domain, even if the user types http://. It prevents SSL stripping attacks and protocol downgrade attacks. The Preload list embeds HSTS into browsers directly."},
]
},

{
title:"Quiz 2 — Network Security, Identity & Privacy",
desc:"Network protocols, firewalls, IDS/IPS, encrypted DNS, Tor, authentication factors, GDPR, and privacy controls.",
questions:[
{q:"What is the default TCP port for SSH?",opts:["21","22","23","443"],ans:[1],exp:"SSH uses port 22/TCP by default. Port 21 is FTP, port 23 is Telnet (unencrypted plaintext), and port 443 is HTTPS. Changing the default SSH port can reduce noise from automated scans but is not a security control."},
{q:"What does DNSSEC add to standard DNS?",opts:["Confidentiality of DNS queries through encryption","Cryptographic integrity and authenticity verification of DNS responses","Faster resolution through caching","Anonymization of DNS client addresses"],ans:[1],exp:"DNSSEC signs DNS records cryptographically, allowing resolvers to verify that responses are authentic and unmodified. It protects against DNS cache poisoning but does not encrypt query contents."},
{q:"Which protocols encrypt DNS queries to protect user privacy from network observers?",opts:["Standard DNS (UDP port 53)","DNSSEC","DNS over TLS (DoT) or DNS over HTTPS (DoH)","Multicast DNS (mDNS)"],ans:[2],exp:"DoT (port 853) and DoH (port 443) encrypt the entire DNS exchange, preventing ISPs and network observers from seeing which domains you query. Standard DNS and DNSSEC do not provide query confidentiality."},
{q:"What characterizes a Distributed Denial of Service (DDoS) attack?",opts:["A single host overwhelming a single server","Coordinated traffic from a botnet targeting a service to exhaust its resources","A distributed port scan across a subnet","A MitM attack on many simultaneous connections"],ans:[1],exp:"A DDoS attack uses thousands to millions of compromised machines (a botnet) to flood a target, making source-based blocking largely ineffective. Mitigation requires upstream scrubbing, rate limiting, and Anycast distribution."},
{q:"What is digital identity theft?",opts:["Creating a fictitious social media profile","The fraudulent use of another person's personal information without their knowledge or consent","An ARP spoofing attack at the MAC layer","An LDAP directory misconfiguration"],ans:[1],exp:"Digital identity theft uses stolen personal data (name, SSN, banking details) to commit fraud, open accounts, or access services in the victim's name. It is often the goal of phishing and data breach operations."},
{q:"What is FIDO2/WebAuthn?",opts:["An SMS-based one-time password standard","A passwordless authentication standard using asymmetric cryptographic key pairs stored on authenticators","A traditional soft-token OTP protocol","An OAuth2-based social login mechanism"],ans:[1],exp:"FIDO2/WebAuthn uses public-key cryptography: a private key on the device or hardware security key (YubiKey) pairs with a public key on the server. It is phishing-resistant because keys are cryptographically bound to the origin domain."},
{q:"What is a brute-force attack against a password?",opts:["Exploiting a known software vulnerability","Systematically trying every possible character combination until the correct password is found","Intercepting a password hash on the network","Using precomputed hash tables to crack passwords"],ans:[1],exp:"A brute-force attack exhaustively tests all combinations. Defenses: long passwords, account lockout policies, CAPTCHA, and adaptive password hashing (bcrypt, Argon2) that is deliberately slow."},
{q:"Which technology is commonly used for centralized authentication in enterprise Linux environments?",opts:["NFS v4","LDAP combined with Kerberos (or Microsoft Active Directory)","SNMP v3","DHCP with option 66"],ans:[1],exp:"LDAP provides the user and group directory; Kerberos provides ticket-based authentication. Active Directory integrates both. Linux clients use PAM, sssd, or FreeIPA to authenticate against these centralized services."},
{q:"What is a web session cookie, and what is its main security risk?",opts:["A server-side configuration file","A client-side identifier that maintains authenticated state; risk: session hijacking if stolen","A web page cache entry causing stale content","A client certificate at risk of expiration"],ans:[1],exp:"Session cookies identify authenticated users to the server. If stolen via XSS or network sniffing, an attacker can hijack the session. HttpOnly, Secure, and SameSite cookie attributes reduce these risks."},
{q:"What does 'data minimization' require under GDPR?",opts:["Compressing data to reduce storage size","Collecting only data that is strictly necessary for the declared processing purpose","Anonymizing all data after 30 days","Encrypting data with at least AES-128"],ans:[1],exp:"GDPR Article 5(1)(c) mandates data minimization: personal data must be adequate, relevant, and limited to what is necessary. Collecting data 'just in case' violates this principle."},
{q:"Which HTTP cookie attribute prevents JavaScript from reading a cookie, reducing XSS risk?",opts:["Secure","SameSite","HttpOnly","Path=/"],ans:[2],exp:"The HttpOnly attribute blocks access to the cookie via document.cookie in JavaScript, preventing XSS attacks from stealing session tokens. Secure prevents transmission over non-TLS connections."},
{q:"Which anonymization technique permanently prevents re-identification of individuals?",opts:["Pseudonymization","Symmetric encryption with a stored key","Irreversible anonymization (e.g., k-anonymity, l-diversity, aggregation)","Reversible tokenization"],ans:[2],exp:"True anonymization irreversibly removes the ability to identify individuals. Pseudonymization replaces identifiers with tokens but is reversible with the mapping table—it remains personal data under GDPR."},
{q:"Which authentication factor falls under the 'possession' category?",opts:["Password","Fingerprint scan","Hardware security key (YubiKey, Google Titan)","PIN code"],ans:[2],exp:"Possession factors are physical items you carry: hardware tokens, smart cards, phones (for TOTP/push). Knowledge: passwords, PINs. Inherence: biometrics. Combining two different categories gives true MFA."},
{q:"What is the key difference between an IDS and an IPS?",opts:["IDS is hardware; IPS is software","IDS detects and alerts; IPS detects and actively blocks threats in real time","IDS is network-based; IPS is host-based only","IDS analyzes logs; IPS analyzes live packets only"],ans:[1],exp:"An IDS (Intrusion Detection System) generates alerts for human review. An IPS (Intrusion Prevention System) automatically blocks malicious traffic inline. Both come in network (NIDS/NIPS) and host-based (HIDS/HIPS) variants."},
{q:"What can nmap be used for in a security assessment?",opts:["Identifying open ports and running services on target hosts","Encrypting network communications","Configuring iptables firewall rules","Inspecting HTTP application payloads"],ans:[0],exp:"nmap is a network scanner that identifies open ports, running services, software versions, and OS fingerprints. It is a fundamental tool for network auditing and penetration testing reconnaissance phases."},
{q:"Which browser security mechanism allows servers to define permitted content sources, defending against XSS?",opts:["CORS (Cross-Origin Resource Sharing)","Content Security Policy (CSP)","HSTS","X-Frame-Options"],ans:[1],exp:"CSP is an HTTP response header that defines which scripts, images, and stylesheets the browser may load. It is the primary defense against XSS attacks and data injection. Violations are reported to the server."},
{q:"What is a DMZ (Demilitarized Zone) in a network security architecture?",opts:["An unsecured guest Wi-Fi network","An isolated segment hosting internet-facing servers, separated from the internal network by firewalls","A network segment reserved for system administrators","An encrypted inter-site VPN segment"],ans:[1],exp:"The DMZ isolates public-facing services (web, mail, DNS) from the internal network. If a DMZ server is compromised, the attacker is still blocked from the internal network by the inner firewall."},
{q:"What does the iptables rule 'iptables -A INPUT -p tcp --dport 22 -j ACCEPT' accomplish?",opts:["Blocks all traffic to SSH port 22","Accepts incoming TCP connections to port 22 (SSH)","Redirects port 22 to an alternate port","Flushes all rules from the INPUT chain"],ans:[1],exp:"This appends (-A) to the INPUT chain a rule accepting (-j ACCEPT) TCP packets (-p tcp) destined for port 22 (--dport 22). It is the standard rule for allowing inbound SSH while a default-deny policy blocks everything else."},
{q:"What does HTTPS guarantee when you connect to a website?",opts:["Complete anonymity for the user","Server authentication, confidentiality, and data integrity","Connection speed optimization","That the website's content is safe and trustworthy"],ans:[1],exp:"HTTPS (HTTP over TLS) provides: server authentication (via certificate validation), confidentiality (encryption), and integrity (tamper detection). It does not guarantee anonymity or that the site is legitimate."},
{q:"Which web attack inserts malicious SQL code through an input field to manipulate a backend database?",opts:["Cross-Site Scripting (XSS)","SQL Injection","Cross-Site Request Forgery (CSRF)","Path Traversal"],ans:[1],exp:"SQL injection exploits insufficient input validation to inject SQL queries. Consequences range from data disclosure to full database compromise. Parameterized queries (prepared statements) are the primary defense."},
{q:"Why is 'security through obscurity' considered an insufficient security strategy?",opts:["It is a valid NIST-approved strategy when used with strong encryption","Hiding implementation details as the sole control fails because determined attackers can discover secrets through reverse engineering","It is an ISO 27001-mandated standalone protection measure","It is a standard firewall technique that hides network topology"],ans:[1],exp:"Security through obscurity conceals how a system works rather than making it genuinely robust. Once the secret is revealed (through reverse engineering, leaks, or insider knowledge), all protection evaporates. It may complement but never replace real security."},
{q:"What is steganography?",opts:["An asymmetric public-key encryption algorithm","The practice of concealing a secret message within a non-secret carrier file (image, audio, video)","A secure peer-to-peer file transfer protocol","A lossless data compression algorithm"],ans:[1],exp:"Steganography hides the existence of a message (not just its content). Secret data can be embedded in image pixels' least-significant bits or in audio file metadata. It is distinct from cryptography, which makes content unreadable."},
{q:"According to current NIST SP 800-63B guidelines, which password practices are recommended?",opts:["Mandatory password rotation every 30 days","Using long passphrases and avoiding forced periodic rotation (which promotes weak passwords)","Limiting passwords to 8 characters for easier memorization","Prohibiting special characters to prevent injection attacks"],ans:[1],exp:"NIST SP 800-63B recommends: long passwords (15+ character passphrases), no required periodic rotation (counterproductive), screening against known-compromised password lists, and permitting all printable characters."},
{q:"What is a social engineering attack?",opts:["An automated exploit targeting software vulnerabilities","Psychological manipulation of individuals to obtain information or unauthorized access","An automated botnet-driven network attack","Code injected via social media platform APIs"],ans:[1],exp:"Social engineering targets people, not systems. Techniques: phishing (email), vishing (phone), pretexting (false identity), baiting (infected USB drops), and quid pro quo schemes. Security awareness training is the primary defense."},
{q:"What is TOTP (Time-based One-Time Password)?",opts:["A permanent password generated once by an authentication server","A short-lived code generated from a shared secret combined with the current Unix timestamp","A hardware USB token for passwordless login","A protocol for encrypting authentication SMS messages"],ans:[1],exp:"TOTP (RFC 6238) generates a 6-digit code every 30 seconds using a shared secret and the current time. Used by authenticator apps (Google Authenticator, Authy). Accurate time synchronization is critical for validity."},
{q:"What security risk is inherent to using unencrypted public Wi-Fi?",opts:["Excessive battery consumption","Any participant on the same network can intercept unencrypted traffic (passive sniffing)","Significantly reduced connection speed","Additional international roaming charges"],ans:[1],exp:"On an open (unencrypted) Wi-Fi network, any participant can passively capture all unencrypted traffic—including credentials, session cookies, and sensitive data. Using HTTPS and a VPN mitigates this risk."},
{q:"What is Certificate Transparency (CT)?",opts:["A real-time certificate revocation protocol","A public append-only log of all TLS certificates issued by CAs, enabling detection of fraudulent certificates","A certificate chain verification algorithm","A specialized code-signing certificate format"],ans:[1],exp:"Certificate Transparency (RFC 6962) requires CAs to log every issued certificate in public, auditable append-only logs. This allows domain owners and browser vendors to detect misissued or unauthorized certificates quickly."},
{q:"What is a penetration test (pentest)?",opts:["Load testing a network under simulated peak traffic","An authorized security engagement that simulates real-world attacks to identify vulnerabilities before malicious actors do","Scanning system logs for operational errors","Deploying security patches across a server fleet"],ans:[1],exp:"A penetration test is a contracted assessment where ethical hackers attempt to compromise systems within a defined legal scope (scope, timeline, rules of engagement), using the same techniques as real attackers."},
{q:"What does non-repudiation ensure in information security?",opts:["The ability to encrypt messages so they cannot be deciphered by anyone","The guarantee that a party cannot deny having performed a specific action, enforced via digital signatures","The principle of blocking all unauthorized actions at the firewall","Redundancy of systems to guarantee uptime"],ans:[1],exp:"Non-repudiation ensures that the sender of a message or initiator of a transaction cannot later deny the action. Digital signatures (using the sender's unique private key) are the primary technical mechanism."},
{q:"Which Linux tool monitors log files and automatically blocks IP addresses after repeated failed authentication attempts?",opts:["df -h","fail2ban","ps aux","lsof"],ans:[1],exp:"fail2ban watches log files (e.g., /var/log/auth.log) for repeated authentication failures and adds iptables/nftables rules to block offending IPs after a configurable threshold. Essential for SSH protection."},
{q:"What is an Information Security Management System (ISMS) according to ISO 27001?",opts:["An enterprise antivirus solution","A systematic framework of policies, processes, and controls for managing information security risks across an organization","An ISO-certified next-generation firewall appliance","A certified vulnerability scanner product"],ans:[1],exp:"An ISMS (ISO 27001) is a structured management approach: risk assessment, selection of controls, implementation, audit, and continuous improvement through the Plan-Do-Check-Act (PDCA) cycle."},
{q:"Which mechanism secures email in transit between mail transfer agents (MTAs)?",opts:["Plain SMTP on port 25 without authentication","SMTP with STARTTLS or implicit TLS (ports 587/465)","Unencrypted POP3 retrieval","HTTP-based mail API"],ans:[1],exp:"STARTTLS upgrades an SMTP connection to TLS opportunistically; port 465 uses implicit TLS from the start. Without TLS, SMTP transmits messages and credentials in cleartext over the public internet."},
{q:"What is DKIM (DomainKeys Identified Mail)?",opts:["A DNS-based IP reputation blacklist","A cryptographic email signature mechanism that allows recipients to verify the sender's domain integrity","An end-to-end email encryption protocol","A server-side mailbox encryption standard"],ans:[1],exp:"DKIM adds a digital signature to outgoing emails using the domain's private key. The receiving server retrieves the public key from a DNS TXT record to verify authenticity. Combined with SPF and DMARC, it combats email spoofing."},
{q:"What is the primary purpose of an immutable (WORM) backup?",opts:["To accelerate backup jobs through deduplication","To prevent backup data from being modified or deleted, especially by ransomware targeting backup repositories","To reduce backup storage footprint","To enable multiple concurrent users to access backup data"],ans:[1],exp:"Immutable (Write Once Read Many) backups cannot be altered or deleted during a defined retention window. They are a critical ransomware defense as attackers now routinely target and encrypt backup systems."},
{q:"What is a honeypot in network security?",opts:["An isolated container for application testing","A deliberately attractive decoy system designed to lure attackers and detect intrusion attempts","A file integrity monitoring tool","A reverse proxy for web application protection"],ans:[1],exp:"A honeypot is a system intentionally made to appear vulnerable and valuable. When an attacker interacts with it, the activity is logged and analyzed. Honeypots provide early detection and intelligence on attacker techniques."},
{q:"Which of the following is an example of an insider threat?",opts:["An external attacker exploiting a published CVE","An employee exfiltrating confidential company data to a competitor","A botnet launching a DDoS attack from external IPs","A port scan originating from a foreign IP range"],ans:[1],exp:"Insider threats come from individuals with legitimate access: current employees, former employees, or contractors. They can be malicious (data theft, sabotage) or accidental (misconfiguration, emailing files to wrong recipients)."},
{q:"Which email authentication standard defines a policy for handling messages that fail SPF or DKIM verification?",opts:["SPF (Sender Policy Framework)","DKIM (DomainKeys Identified Mail)","DMARC (Domain-based Message Authentication, Reporting and Conformance)","MX record configuration"],ans:[2],exp:"DMARC is a DNS TXT policy record specifying how receiving servers should handle emails failing SPF/DKIM alignment: none (monitor), quarantine, or reject. It also enables aggregate and forensic reporting on spoofing attempts."},
{q:"What is 'credential stuffing'?",opts:["Creating synthetic credentials to access a test environment","Automated use of username/password pairs stolen from previous data breaches to attempt login on other services","A brute-force attack limited to a single target service","Embedding credentials directly in application source code"],ans:[1],exp:"Credential stuffing exploits password reuse at scale. Automated tools test millions of stolen credential pairs against other services. Defenses: unique passwords per service, MFA, rate limiting, and anomaly detection."},
{q:"What does pseudonymization mean under GDPR?",opts:["Irreversible deletion of all personal data","Replacing directly identifying attributes with artificial identifiers; re-identification remains possible with a separate mapping key","Full disk encryption of data at rest","Complete anonymization so no individual can ever be identified"],ans:[1],exp:"Pseudonymization replaces names, emails, etc., with pseudonyms. Re-identification is possible with the key table. GDPR considers pseudonymized data still personal data but recognizes it as a security measure that reduces breach risk."},
{q:"What is the main benefit of a secrets management tool such as HashiCorp Vault or AWS Secrets Manager?",opts:["Storing employee password lists","Securely storing, distributing, auditing, and automatically rotating application secrets (API keys, DB credentials, certificates)","Encrypting an entire production database","Managing VPN access for all remote developers"],ans:[1],exp:"Secrets managers centralize application secrets with fine-grained access control, immutable audit logs, and automatic rotation. They eliminate 'secret sprawl'—credentials hardcoded in source code, config files, or environment variables."},
]
},

{
title:"Quiz 3 — Device, Storage & Application Security",
desc:"Malware categories, Linux security controls (SELinux, capabilities), application security, IoT, encryption at rest, and vulnerability management.",
questions:[
{q:"Which Linux framework implements Mandatory Access Control (MAC) policies at the kernel level, beyond standard DAC permissions?",opts:["sudo","SELinux / AppArmor","chmod / chown","PAM (Pluggable Authentication Modules)"],ans:[1],exp:"SELinux and AppArmor enforce security policies independently of file ownership. Even a process running as root can be restricted by SELinux type enforcement. This limits damage from compromised privileged accounts."},
{q:"Why is timely application of security patches critical?",opts:["Patches update the graphical user interface","Patches fix exploitable vulnerabilities identified in CVEs, removing known attack vectors","Patches only add new features without security implications","Patches configure automatic backups"],ans:[1],exp:"Security patches close vulnerabilities that attackers could exploit. Unpatched systems remain exposed to published exploits; known-unpatched software is consistently among the top attack vectors in incident reports."},
{q:"Which malware type disguises itself as a legitimate application to trick users into executing it?",opts:["Worm","Ransomware","Trojan horse","Rootkit"],ans:[2],exp:"A Trojan presents itself as useful software (game, utility, cracked application). Once executed by the user, it installs a backdoor, keylogger, or downloads additional payloads. Unlike worms, Trojans require user action."},
{q:"What is spyware?",opts:["Malware that encrypts files for ransom","Software that covertly collects user activity data and transmits it to a remote third party","A virus that propagates via network shares","A legitimate employee activity monitoring solution"],ans:[1],exp:"Spyware monitors user behavior silently: keystrokes, screenshots, browsing history, file access. Data is exfiltrated without user consent. It is frequently bundled with 'free' applications or installed via browser exploits."},
{q:"What is adware?",opts:["A legitimate advertising management platform","Software that displays unsolicited advertisements, often collecting browsing data as well","A ransomware variant targeting advertising agencies","A malicious ad-blocking extension"],ans:[1],exp:"Adware generates revenue through intrusive ads. Frequently bundled with free software (PUP—Potentially Unwanted Program), it may also harvest browsing data, blurring the line with spyware."},
{q:"Which Linux tool builds a baseline of file attributes and detects unauthorized modifications to system files?",opts:["ls -la","AIDE (Advanced Intrusion Detection Environment) or Tripwire","df -h","lsof -i"],ans:[1],exp:"AIDE and Tripwire record checksums (MD5, SHA-256), permissions, and timestamps for monitored files. Scheduled integrity checks detect rootkit modifications to system binaries or configuration files."},
{q:"What is eCryptfs in Linux?",opts:["A block-device full-disk encryption layer","A stacked filesystem providing per-file encryption, commonly used for home directory encryption","A network-layer encryption protocol","An OpenPGP email encryption tool"],ans:[1],exp:"eCryptfs is a POSIX-compliant stacked cryptographic filesystem. It encrypts files individually and stores the ciphertext in a lower filesystem. Ubuntu has used it for home directory encryption. LUKS encrypts at the block level."},
{q:"What is the primary security benefit of Full Disk Encryption (FDE)?",opts:["Data is protected even if the physical storage device is stolen or removed","Only recently modified files are encrypted","Disk read/write performance is improved","It replaces the system login password as the sole authentication factor"],ans:[0],exp:"FDE (via LUKS/BitLocker/FileVault) ensures that all data on disk is unreadable without the correct key, even if the drive is removed and mounted on a different system. It protects against physical theft scenarios."},
{q:"What does UEFI Secure Boot verify?",opts:["System boots in read-only mode","Cryptographic signatures of the bootloader and OS kernel before execution","Encryption of BIOS/UEFI configuration","Access to a system recovery partition"],ans:[1],exp:"Secure Boot uses a key database to verify that the bootloader and kernel are signed by a trusted key before running them. This blocks bootkits and rootkits that infect the boot chain to achieve persistence."},
{q:"Which security risks are commonly associated with IoT devices?",opts:["Only excessive power consumption","Unchanged default credentials, unpatched firmware, lack of encryption, and minimal security monitoring capability","Risks are limited to the home Wi-Fi network only","Risks only to the device owner's personal data"],ans:[1],exp:"IoT devices are notoriously insecure: factory default passwords often unchanged, infrequent firmware updates, cleartext protocols, no EDR agent. They are frequently compromised and recruited into botnets like Mirai."},
{q:"What is a 'bluebugging' Bluetooth attack?",opts:["A Bluetooth denial-of-service attack","Exploiting Bluetooth vulnerabilities to gain unauthorized control of a device (calls, messages, data)","NFC-based identity theft","A Bluetooth-delivered mobile ransomware"],ans:[1],exp:"Bluebugging exploits Bluetooth stack vulnerabilities to take complete control of a target device—making calls, reading contacts/SMS, or installing malware. Defense: keep firmware updated, disable Bluetooth when unused."},
{q:"Why does RAID 1 not substitute for traditional backups?",opts:["RAID 1 is superior because it is fully automated","RAID 1 only protects against physical drive failure; accidental deletion and ransomware encryption are mirrored instantly to both drives","A backup and RAID 1 provide identical protection","RAID 1 also encrypts data unlike backups"],ans:[1],exp:"RAID 1 mirrors data in real time. Accidental file deletion or ransomware encryption propagates immediately to all mirror drives. An offline or immutable backup breaks this chain and enables actual data recovery."},
{q:"What security isolation benefit does server virtualization provide?",opts:["It fully replaces host OS security mechanisms","A compromised VM is isolated from other VMs and the hypervisor host (absent a hypervisor escape exploit)","Virtualization disables firewalls for performance","It makes storage encryption unnecessary"],ans:[1],exp:"Virtualization provides strong isolation: each VM has its own memory space and virtual disk. Malware in one VM cannot directly access other VMs or the host OS, unless a hypervisor vulnerability is exploited."},
{q:"Which Linux feature assigns specific privileges to processes without granting full root access?",opts:["sudo -i","Linux Capabilities (CAP_NET_BIND_SERVICE, CAP_SYS_ADMIN, etc.)","chmod +s (setuid bit)","chroot jail"],ans:[1],exp:"Linux Capabilities divide the monolithic root privilege into granular units. A web server can bind port 80 (CAP_NET_BIND_SERVICE) without running as full root. This applies least privilege at the process level."},
{q:"How do containers differ from VMs regarding security isolation?",opts:["Containers are more secure as they have their own kernel","Containers share the host kernel, providing weaker isolation; a kernel exploit can compromise the host","Container security is identical to VM security","Containers cannot be compromised by external attackers"],ans:[1],exp:"Containers share the host OS kernel—stronger isolation than processes, weaker than VMs. Container security relies on Linux namespaces, cgroups, seccomp profiles, and MAC (SELinux/AppArmor) to compensate.",},
{q:"Which malware analysis method executes a sample in a controlled isolated environment to observe its behavior?",opts:["Static analysis (disassembly without execution)","Binary reverse engineering","Dynamic analysis / sandboxing","Post-incident forensic imaging"],ans:[2],exp:"Dynamic (sandbox) analysis runs the sample in a controlled environment and logs: files created/modified, network connections, registry changes, and spawned processes. Cuckoo Sandbox is a popular open-source tool.",},
{q:"What is the 'defense in depth' security principle?",opts:["Deploying one extremely powerful central firewall","Layering multiple independent security controls so bypassing one does not give an attacker complete access","Concentrating all defenses at the network perimeter","Securing only the most business-critical data"],ans:[1],exp:"Defense in depth stacks controls: perimeter firewall, network segmentation, host-based EDR, data encryption, MFA, and logging. Each layer compensates for the weaknesses of others and raises the cost for attackers.",},
{q:"What is a zero-day vulnerability?",opts:["A vulnerability that is exploited precisely at midnight","A security flaw unknown to the vendor or without an available patch, exploitable immediately upon discovery","A critical vulnerability discovered exactly zero days ago by a researcher","A boot-time bug that appears only at system startup"],ans:[1],exp:"A zero-day is a vulnerability for which the affected vendor has zero days to prepare a response—because it is unknown to them or because no patch exists yet. Zero-days are highly valued and typically used in targeted attacks.",},
{q:"Which tools can be used to encrypt storage on Linux? (Choose ONE best answer)",opts:["LUKS/dm-crypt (block-level) only","eCryptfs (file-level) only","VeraCrypt (container-based) only","LUKS/dm-crypt, eCryptfs, and VeraCrypt are all valid options for different use cases"],ans:[3],exp:"LUKS/dm-crypt encrypts entire block devices. eCryptfs encrypts individual files and directories. VeraCrypt creates portable encrypted containers. Choosing the right tool depends on the use case (full disk vs. directory vs. portable)."},
{q:"What is an SPF (Sender Policy Framework) record?",opts:["A DNS TXT record listing IP addresses authorized to send email for a domain","A TLS certificate specifically for SMTP servers","An end-to-end email encryption mechanism","A client-side junk mail filter configuration"],ans:[0],exp:"SPF is a DNS TXT record specifying which mail servers are authorized to send messages on behalf of a domain. Receiving servers check the sending IP against the SPF record to detect spoofed sender addresses."},
{q:"In which situation is a LUKS recovery key (additional passphrase slot) useful?",opts:["To speed up disk decryption via hardware offloading","To decrypt the volume if the primary passphrase is forgotten or the primary key slot is corrupted","To encrypt the volume with a backup algorithm","LUKS does not support multiple passphrases"],ans:[1],exp:"LUKS supports up to 8 independent key slots (passphrases or keyfiles). A recovery key stored securely offline can unlock the volume if the primary passphrase is lost—critical for enterprise disaster recovery."},
{q:"Which password attack method uses wordlists of common words, phrases, and predictable variations?",opts:["Pure brute-force (all character combinations)","Dictionary attack","Rainbow table attack","Birthday attack"],ans:[1],exp:"A dictionary attack uses curated wordlists of common passwords, variations (l33tspeak, appended numbers), and breached password corpora. Far more efficient than exhaustive brute force against human-chosen passwords."},
{q:"What does application sandboxing on a mobile OS achieve?",opts:["Encrypting all application data on disk","Isolating each application in its own runtime environment, preventing access to other apps' data","Throttling application CPU and memory usage","Verifying the application's digital signature at install time"],ans:[1],exp:"Android and iOS sandbox every app: separate process space, restricted filesystem access, and explicit permission grants for sensitive APIs. A malicious app cannot read another app's private data without granted permissions."},
{q:"What does the security principle 'fail-safe defaults' specify?",opts:["Systems must restart automatically after any failure","Default access is denied; permissions must be explicitly and intentionally granted","Systems must auto-save state on any failure event","Factory defaults must reflect the maximum security configuration possible"],ans:[1],exp:"Fail-safe defaults mean: when in doubt, deny access. Rights are granted explicitly, never assumed. This is the opposite of fail-open systems that grant access when a control malfunctions."},
{q:"Which Linux commands allow real-time monitoring of running processes for anomalous activity?",opts:["ps aux / top / htop","ls -la /proc","df -h","netstat -s"],ans:[0],exp:"ps aux lists all processes with command-line arguments. top and htop display real-time CPU/memory usage. Unexplained processes or abnormal resource consumption can indicate malware activity."},
{q:"What is egress filtering in a network security context?",opts:["Filtering inbound traffic from the internet","Controlling outbound traffic to prevent data exfiltration and block malware beaconing to C2 servers","Inspecting inbound packet payloads for malware signatures","Providing a reverse proxy for outgoing API calls"],ans:[1],exp:"Egress filtering controls traffic leaving the network. It blocks connections to known malicious domains, prevents data exfiltration, restricts unauthorized applications from communicating externally, and limits malware C2 callback."},
{q:"Why should security event logs be forwarded to a remote SIEM in real time?",opts:["To store logs in RAM for the fastest access","Attackers who compromise a system erase local logs; remote centralized logs preserve the forensic record","To delete logs after 24 hours for storage efficiency","To encrypt logs with a key only the attacker lacks"],ans:[1],exp:"Forwarding logs to a remote SIEM in real time ensures the evidence is preserved even if an attacker gains root and deletes all local logs. Immutable remote storage and log integrity hashing further protect the audit trail."},
{q:"What is an 'air gap' in a security architecture?",opts:["An empty rack unit between servers","A network that is completely physically isolated—no cables, Wi-Fi, or wireless connection to any external network","An encrypted VPN tunnel between two sites","A stateless packet-filtering firewall"],ans:[1],exp:"An air-gapped network is physically isolated from all external networks. Used for the most sensitive systems (nuclear control, classified government networks, ICS/SCADA). Stuxnet demonstrated that even air gaps can be breached (via infected USB drives)."},
{q:"What does the command 'gpg --encrypt --recipient alice@example.com file.txt' accomplish?",opts:["Encrypts file.txt with the sender's own private key","Encrypts file.txt with Alice's public key so that only Alice's private key can decrypt it","Signs file.txt with Alice's public key","Generates a new key pair for alice@example.com"],ans:[1],exp:"This encrypts the file using Alice's public key. Only Alice, who holds the corresponding private key, can decrypt it with 'gpg --decrypt file.txt.gpg'. This is the standard asymmetric encryption workflow in GPG."},
{q:"What does a mature vulnerability management program include?",opts:["Installing patches on an ad-hoc basis when reminded","A continuous cycle of discovery (scanning), assessment (CVSS scoring), prioritization, remediation, and verification","A one-time deployment of an intrusion detection system","Periodic manual review of user access rights only"],ans:[1],exp:"Vulnerability management is continuous: scan regularly (OpenVAS, Nessus, Qualys), score severity (CVSS), prioritize by business risk, remediate (patch or mitigate), and verify that the fix is effective."},
{q:"Which protocol replaced Telnet for secure remote server administration?",opts:["FTP with TLS","SSH (Secure Shell)","SNMP v3","HTTP with Basic Authentication"],ans:[1],exp:"SSH encrypts the entire administrative session including credentials, commands, and data. Telnet transmits everything in plaintext. SSH also provides port forwarding, SFTP, and strong public-key authentication."},
{q:"Which combination of controls reduces the risk of drive-by download attacks during web browsing?",opts:["Using only HTTP to avoid fraudulent TLS certificates","Disabling automatic browser updates to preserve stability","Deploying a script/ad blocker and keeping the browser fully up to date","Allowing all browser pop-ups to avoid missing legitimate content"],ans:[2],exp:"Script blockers (uBlock Origin, NoScript) prevent malicious code via malvertising. An up-to-date browser closes CVEs exploited in drive-by downloads. Both controls significantly reduce the web-delivered malware attack surface."},
{q:"What is 'pivoting' in the context of a network intrusion?",opts:["Rebooting a compromised server to erase forensic artifacts","Using a compromised host as a relay to attack other systems deeper in the internal network","Bouncing DNS queries through multiple resolvers","Using an anonymization proxy to hide the attacker's originating IP"],ans:[1],exp:"Pivoting uses a compromised host as a beachhead to reach otherwise inaccessible internal systems. Defense: network segmentation, internal east-west traffic monitoring, and micro-segmentation limit pivot opportunities."},
{q:"Which TWO of the following are characteristics of a strong organizational password policy?",opts:["Minimum password length of 12 or more characters","Automatic verification of new passwords against known-breached password databases","Mandatory password change every 30 days for all accounts","Character complexity requirements: uppercase, lowercase, digits, and special characters"],ans:[0,1],multi:true,exp:"NIST SP 800-63B recommends: minimum length (12+ chars), screening new passwords against breached-password databases (e.g., HaveIBeenPwned API), and allowing all printable characters. Forced periodic rotation is discouraged as it leads to predictable patterns."},
{q:"What distinguishes an Extended Validation (EV) certificate from a Domain Validation (DV) certificate?",opts:["EV and DV certificates are technically identical; EV is simply more expensive","EV requires rigorous legal vetting of the organization's identity; DV only verifies domain control","EV certificates are always self-signed","DV certificates offer stronger cryptographic protection than EV"],ans:[1],exp:"DV: CA verifies only domain control (e.g., via DNS or email). EV: CA performs extensive vetting of the legal entity (business registration, physical address, authorized signatories). Modern browsers no longer show the green bar but display the organization name for EV."},
{q:"Which command sequence initializes and opens a LUKS-encrypted volume on Linux?",opts:["mkfs.ext4 /dev/sdb1 followed by mount","cryptsetup luksFormat /dev/sdb1 followed by cryptsetup luksOpen","fdisk /dev/sdb followed by mount","gpg --symmetric /dev/sdb1"],ans:[1],exp:"Workflow: cryptsetup luksFormat (writes LUKS header + sets passphrase) → cryptsetup luksOpen (maps to /dev/mapper/name) → mkfs.ext4 /dev/mapper/name (creates filesystem) → mount. luksFormat destroys all existing data."},
]
