{
title:"Quiz 4 — Full Practice Exam",
desc:"Complete 40-question simulation covering all five domains proportionally to official 020-100 objective weights. Closest format to Pearson VUE.",
questions:[
{q:"Which of the three security properties in the CIA triad ensures that services remain accessible to authorized users?",opts:["Confidentiality","Integrity","Availability","Non-repudiation"],ans:[2],exp:"Availability ensures that systems and data are accessible when needed by authorized users. DoS and DDoS attacks specifically target availability. Redundancy, load balancing, and DDoS mitigation services protect it."},
{q:"What is the conceptual difference between a vulnerability and a threat?",opts:["They are used interchangeably in security documentation","A vulnerability is an exploitable weakness in a system; a threat is an actor or event capable of exploiting it","Threats are technical flaws; vulnerabilities are human-related","Vulnerabilities affect networks; threats affect applications"],ans:[1],exp:"Vulnerability = exploitable weakness (misconfiguration, software bug). Threat = actor/event (malicious hacker, natural disaster) that could exploit the vulnerability. Risk = likelihood × impact of that exploitation."},
{q:"Under which condition is performing a penetration test both legal and ethical?",opts:["When the tester believes the system is insecure","When explicit written authorization from the system owner has been obtained, defining scope and rules of engagement","When the tester is employed by the target organization","When only open-source scanning tools are used"],ans:[1],exp:"Penetration testing without explicit written authorization is illegal in most jurisdictions (e.g., CFAA in the US, Computer Misuse Act in the UK). Proper authorization must define scope, exclusions, timeline, and emergency contacts."},
{q:"What is symmetric cryptography and what is its primary limitation?",opts:["Uses two mathematically related keys; limitation is computational complexity","Uses the same key for both encryption and decryption; limitation is secure key distribution to all parties","Used exclusively for one-way hashing; limitation is irreversibility","Based on CA-issued certificates; limitation is the cost of the PKI"],ans:[1],exp:"Symmetric encryption (AES, ChaCha20) uses one shared key. The fundamental challenge: securely distributing that key to the other party over an untrusted channel. Asymmetric key exchange (Diffie-Hellman) solves this."},
{q:"What does a digital signature on a document provide?",opts:["Confidentiality: only the recipient can read it","Authenticity of the signer and integrity of the document content","Encryption of the document contents for the recipient","Anonymity of the document's author"],ans:[1],exp:"A digital signature uses the signer's private key to sign a hash of the document. It proves authenticity (only the private key holder could have signed it) and integrity (any modification invalidates the signature)."},
{q:"What does the padlock icon in a browser's address bar confirm during an HTTPS connection?",opts:["The URL begins with http://","TLS is active and the certificate matches the domain being visited","The web page has a green background","The server responded within an acceptable time limit"],ans:[1],exp:"The padlock indicates an active TLS session with a validated server certificate. The certificate must be signed by a trusted CA and match the domain. A mismatch generates a security warning."},
{q:"Which protocol version provides both confidentiality and integrity for web traffic and is the current recommended standard?",opts:["HTTP/2 without TLS","HTTPS using TLS 1.3","HTTPS using SSL 3.0","FTPS using TLS 1.0"],ans:[1],exp:"TLS 1.3 is the current standard, featuring improved performance (1-RTT handshake), removal of weak cipher suites, and forward secrecy by default. TLS 1.2 is still acceptable; SSL 3.0 and TLS 1.0/1.1 are deprecated."},
{q:"What is S/MIME and where is it used?",opts:["An IPsec VPN tunneling protocol","A standard for securing email via digital signatures and/or encryption using X.509 certificates","A secure file synchronization protocol","A web-based single sign-on mechanism"],ans:[1],exp:"S/MIME (Secure/Multipurpose Internet Mail Extensions) uses X.509 certificates issued by a CA to sign and/or encrypt email. It integrates natively into clients like Outlook and Apple Mail, making it suited for enterprise deployments."},
{q:"Which combination of cryptographic techniques does a TLS session use?",opts:["Only symmetric ciphers throughout the session","Asymmetric cryptography for key exchange during the handshake, then symmetric for bulk data encryption","Only asymmetric cryptography for all data","MD5 hashing to ensure confidentiality of data"],ans:[1],exp:"TLS uses asymmetric cryptography (RSA or ECDHE) during the handshake to establish a session key, then switches to fast symmetric encryption (AES-GCM) for bulk data. This combines key exchange security with data transfer performance."},
{q:"What is a computer virus?",opts:["Any type of malicious software","Malware that attaches to a legitimate host file and replicates whenever the infected file is executed","Malware that propagates autonomously without any host file","Legitimate monitoring software repurposed maliciously"],ans:[1],exp:"A virus attaches to an existing executable or document. It replicates by infecting other files when the host is run. Unlike worms (autonomous propagation), viruses require a host file to spread."},
{q:"What security risks does a BYOD (Bring Your Own Device) policy introduce into an enterprise?",opts:["No additional risk if the employee passes a background check","Corporate data accessed from unmanaged, potentially unpatched or compromised personal devices","Only the physical theft risk of the device itself","Risks limited solely to the employee's personal data stored on the device"],ans:[1],exp:"BYOD introduces devices outside IT control: potentially outdated OS, unauthorized apps, mixed personal/corporate data, and exposure to public networks. MDM (Mobile Device Management) and NAC (Network Access Control) help manage this risk."},
{q:"Which Linux commands are used to test network connectivity and DNS name resolution?",opts:["ls -la /etc/hosts","ping hostname && dig hostname","df -h /var/log","chmod 755 /etc/resolv.conf"],ans:[1],exp:"ping tests ICMP reachability. dig (or nslookup) performs DNS queries and shows resolution details. These two tools together diagnose the most common network connectivity and name resolution problems."},
{q:"What distinguishes spear phishing from broad phishing campaigns?",opts:["Spear phishing targets thousands of random email addresses simultaneously","Spear phishing is a targeted attack personalized with specific information about the individual or organization","Spear phishing is sent exclusively via SMS","Spear phishing targets only C-level executives (this specific variant is called whaling)"],ans:[1],exp:"Spear phishing uses prior reconnaissance (name, role, recent project, manager's name) to craft convincing, highly targeted messages. Success rates far exceed generic phishing. Whaling specifically targets senior executives."},
{q:"What is a WAF (Web Application Firewall)?",opts:["A traditional stateful network firewall operating at IP/TCP layers","A security component inspecting HTTP/HTTPS traffic to detect and block web-layer attacks (SQLi, XSS, CSRF)","A web content delivery cache with access controls","A generic network-layer intrusion detection sensor"],ans:[1],exp:"A WAF analyzes HTTP request and response content at Layer 7. It blocks attacks like SQL injection, XSS, CSRF, path traversal, and malformed requests that bypass network firewalls operating at lower layers."},
{q:"Which protocol enables real-time verification of whether a specific TLS certificate is currently revoked?",opts:["CRL (Certificate Revocation List) download","OCSP (Online Certificate Status Protocol)","HSTS preloading","Certificate Transparency log query"],ans:[1],exp:"OCSP allows clients to query the CA's OCSP responder for the status of a specific certificate in real time. CRL requires downloading a potentially large, potentially stale list. OCSP Stapling improves performance further."},
{q:"What is homomorphic encryption?",opts:["Encryption that produces identical ciphertext for all users","Encryption that allows meaningful computation on ciphertext without decrypting it first","Encryption of data relationships within a relational database","Bidirectional authenticated encryption between exactly two parties"],ans:[1],exp:"Homomorphic encryption enables a cloud provider to perform computations on encrypted data and return an encrypted result. When decrypted by the data owner, it equals the result of performing the same computation on the plaintext."},
{q:"What is typosquatting?",opts:["A URL-based code injection attack","Registering domain names similar to legitimate sites (exploiting typing errors) to deceive users into visiting them","A DDoS amplification technique using manipulated domains","A variant of DNS cache poisoning"],ans:[1],exp:"Typosquatting registers domains like 'googgle.com' or 'paypa1.com'. Victims reaching the site are presented with a convincing phishing clone. Verifying URLs carefully and using bookmark managers reduces this risk."},
{q:"What does end-to-end encryption in a messaging application guarantee?",opts:["The messaging server can read message content but encrypts it before archiving","Only the sender and recipient hold decryption keys; the server relays ciphertext it cannot read","TLS encryption is applied only between the app and the server","Encryption is active at both ends of normal business hours"],ans:[1],exp:"True E2EE (Signal, WhatsApp) generates and stores encryption keys on user devices only. The server routes ciphertext it cannot decrypt. Even a complete server compromise does not expose message contents."},
{q:"Which Linux tools or frontends configure the Netfilter kernel packet filtering framework?",opts:["Only iptables directly","Only nftables since kernel 3.13","Only ufw on Debian/Ubuntu systems","iptables, nftables, ufw, and firewalld all configure Netfilter"],ans:[3],exp:"iptables and nftables interface directly with Netfilter. ufw (Uncomplicated Firewall) and firewalld are higher-level management frontends that generate iptables or nftables rules under the hood. All configure the same kernel framework."},
{q:"What is meant by the 'attack surface' of a system?",opts:["The physical footprint of server hardware in a data center","The totality of potential entry points that an attacker could attempt to exploit","The size of the application's compiled codebase","The count of administrators with privileged system access"],ans:[1],exp:"The attack surface comprises open ports, active services, exposed APIs, user interfaces, third-party dependencies, and access-holding accounts. Security hardening aims to minimize this surface—fewer entry points means fewer opportunities for attackers."},
{q:"Which cryptographic property of a hash function ensures it is computationally infeasible to recover the input from its hash output?",opts:["Uniqueness","Pre-image resistance (one-way property)","Determinism","Collision resistance"],ans:[1],exp:"Pre-image resistance means: given hash h, finding m such that hash(m)=h is computationally infeasible. This 'one-way' property is essential for password storage—you verify by re-hashing the attempt, never by reversing the hash."},
{q:"What is DMARC (Domain-based Message Authentication, Reporting and Conformance)?",opts:["An end-to-end email encryption standard","A DNS policy record specifying how receivers should handle emails failing SPF/DKIM alignment checks","A server-side TLS certificate for SMTP","A content-based anti-spam scoring mechanism"],ans:[1],exp:"DMARC (DNS TXT) instructs receiving mail servers to quarantine or reject messages that fail SPF/DKIM alignment. It also generates aggregate and forensic reports, giving domain owners visibility into spoofing attempts."},
{q:"Which attack exploits overly permissive CORS (Cross-Origin Resource Sharing) configuration?",opts:["SQL injection via CORS headers","Unauthorized cross-origin API calls using the victim's authenticated browser session","Directory traversal via malformed Origin headers","XML External Entity (XXE) injection through CORS preflight"],ans:[1],exp:"When CORS is misconfigured (e.g., reflecting any origin), a malicious website can make credentialed API calls to a target site using the victim's browser cookies. Strict CORS policies permit only explicitly trusted origins."},
{q:"What does the principle of accountability require in IT security?",opts:["The ability to encrypt all actions performed by users","The ability to trace and attribute every action to a specific identified and authenticated user through logs","Domain-based access restriction across organizational boundaries","Automatic session termination for idle accounts"],ans:[1],exp:"Accountability requires strong authentication (to establish identity), comprehensive logging (to record actions), and log integrity protection (to prevent tampering). Together they ensure actions can be attributed and audited."},
{q:"Which three components make up the CIA triad?",opts:["Cryptography, Infrastructure, Access control","Confidentiality, Integrity, Availability","Control, Identification, Authorization","Cipher strength, Integrity algorithms, Authentication protocols"],ans:[1],exp:"The CIA triad is the foundational information security model: Confidentiality (prevent unauthorized disclosure), Integrity (prevent unauthorized modification), Availability (ensure authorized access when needed)."},
{q:"Which tool is primarily used to analyze network packet captures (.pcap files) at the protocol level?",opts:["htop","Wireshark or tcpdump","nmap","fail2ban"],ans:[1],exp:"Wireshark provides a GUI for deep protocol analysis of captured traffic. tcpdump is the CLI equivalent. Both read .pcap files. They are essential for network forensics, protocol debugging, and security incident analysis."},
{q:"What does 'system hardening' involve?",opts:["Installing an antivirus product","Reducing the attack surface through disabling unused services, enforcing secure configurations, restricting permissions, and applying patches","Configuring RAID arrays for high availability","Performing software updates only"],ans:[1],exp:"System hardening includes: removing unnecessary packages and services, disabling default accounts, enforcing secure SSH/web server configurations, applying CIS benchmarks, enabling MAC (SELinux/AppArmor), and conducting regular audits."},
{q:"Which approach provides cryptographically authenticated time synchronization on Linux?",opts:["Standard NTP (UDP port 123) without authentication","NTPsec or Chrony configured with symmetric key or NTS (NTP over TLS)","SNTP without authentication","ICMP timestamp messages"],ans:[1],exp:"Accurate time synchronization is critical for log correlation, Kerberos authentication, and TLS certificate validity. NTPsec and Chrony with authenticated key exchange or NTS prevent time manipulation attacks."},
{q:"What is 'vishing' in the context of social engineering?",opts:["A phishing attack delivered via video message","A telephone-based social engineering attack impersonating IT support, financial institutions, or government agencies","A VoIP-only variant of phishing targeting SIP phones","A virus transmitted through analog voice signals"],ans:[1],exp:"Vishing (voice phishing) uses live or automated phone calls. Attackers impersonate IT helpdesk (requesting password resets), banks (requesting card details), or tax authorities (demanding immediate payment)."},
{q:"Which tool audits an SSH server's configuration and algorithm support for security weaknesses?",opts:["ssh-keyscan (collects host keys)","ssh-audit (analyzes ciphers, MACs, key exchange algorithms, and known CVEs)","sshd -T (dumps effective configuration)","ssh -v (verbose client debug)"],ans:[1],exp:"ssh-audit tests an SSH server's supported algorithms and identifies weak ones (MD5 MACs, CBC ciphers, weak DH groups), deprecated features, and known CVEs. It is the standard tool for SSH security benchmarking."},
{q:"Which security risk is specifically associated with RFID technology?",opts:["Very short range eliminates all practical security risks","Unauthorized contactless reading and cloning of RFID credentials (skimming) without physical contact","RFID is used only in logistics and presents no personal data risk","RFID encryption is universally mandatory, so no risk exists"],ans:[1],exp:"RFID skimming uses inexpensive readers to silently capture data from unshielded access cards, passports, or contactless payment cards at close range. RFID-blocking wallets and strong mutual authentication protocols (ISO 14443 with crypto) mitigate this."},
{q:"What is the primary function of a SIEM (Security Information and Event Management) system?",opts:["To replace firewalls and endpoint antivirus","To centralize, correlate, and analyze security events from multiple sources for real-time detection and incident response","To encrypt all inter-system network communications","To provision and de-provision user accounts across systems"],ans:[1],exp:"A SIEM aggregates logs from firewalls, servers, endpoints, and applications. It correlates events to detect attack patterns, generates prioritized alerts, and provides data for forensic investigations and compliance reporting."},
{q:"What is multi-factor authentication (MFA)?",opts:["Authenticating with two or more passwords from the same knowledge category","Combining two or more authentication factors from different categories to verify identity","Encrypting authentication credentials multiple times using different algorithms","Requiring login from multiple geographic locations simultaneously"],ans:[1],exp:"MFA requires at least two factors from different categories: knowledge (password, PIN), possession (hardware key, TOTP app), or inherence (fingerprint, facial recognition). A single compromised factor is insufficient for unauthorized access."},
{q:"What does 'threat intelligence' provide to a security operations team?",opts:["Automated, zero-touch patching of vulnerable systems","Actionable data about threat actor TTPs (Tactics, Techniques, and Procedures) and indicators of compromise (IOCs)","A real-time list of every newly published CVE","Hardware firewall signature updates"],ans:[1],exp:"Threat intelligence aggregates data from OSINT, commercial feeds, and ISACs to produce actionable insights: who is attacking, with what tools, targeting which sectors, and what indicators to watch for. This enables proactive, informed defense."},
{q:"Which of the following best describes a supply chain attack?",opts:["A cyberattack targeting a retailer's point-of-sale terminals","Compromising a trusted software vendor or shared library to distribute malware to the vendor's customers through legitimate update channels","A DDoS attack against a logistics and shipping company","A social engineering attack targeting a company's purchasing department"],ans:[1],exp:"Supply chain attacks compromise software at the vendor level. The SolarWinds/SUNBURST attack and the XZ Utils backdoor (2024) are prominent examples. The attacker inserts malicious code that is distributed as a trusted, signed software update."},
{q:"Which component of PAM (Pluggable Authentication Modules) on Linux enforces password complexity requirements?",opts:["pam_unix (standard Unix authentication)","pam_pwquality / pam_cracklib (password quality checking)","pam_limits (resource limits)","pam_env (environment variables)"],ans:[1],exp:"pam_pwquality (and its predecessor pam_cracklib) enforces strength policies: minimum length, required character classes, dictionary checking, and repetition limits. Configured in /etc/security/pwquality.conf and referenced in PAM service files."},
{q:"What does the concept of 'privacy by design' require when developing systems that handle personal data?",opts:["Adding privacy controls as a final step before production deployment","Embedding privacy and data protection measures proactively into the system architecture and development process from the start","Documenting privacy policies after launch for regulatory compliance","Outsourcing all privacy responsibilities to a third-party DPO"],ans:[1],exp:"Privacy by design (Ann Cavoukian, also enshrined in GDPR Article 25) requires building privacy protections into systems from inception: data minimization, encryption by default, access controls, and regular privacy impact assessments—not as an afterthought."},
]
}

// ─── STATE ────────────────────────────────────────────────
let S={quiz:null,qIdx:0,answers:[],timer:null,timeLeft:3600,answered:false};
const DC={'021':'var(--d021)','022':'var(--d022)','023':'var(--d023)','024':'var(--d024)','025':'var(--d025)'};
const DN={'021':'021 Security Concepts','022':'022 Encryption','023':'023 Device & Storage Sec.','024':'024 Network & Service Sec.','025':'025 Identity & Privacy'};

function getSaved(i){try{return JSON.parse(localStorage.getItem('se2_'+i));}catch(e){return null;}}
function saveScore(i,s){localStorage.setItem('se2_'+i,JSON.stringify({score:s,date:Date.now()}));}

function buildHome(){
  const el=document.getElementById('quiz-select');
  el.innerHTML='';
  QUIZZES.forEach((q,i)=>{
    const sv=getSaved(i);
    const d=document.createElement('div');
    d.className='quiz-card';
    const b=sv?`<div class="score-badge ${sv.score>=500?'score-pass':'score-fail'}">${sv.score}/800</div>`:'';
    d.innerHTML=`${b}<h3>${q.title}</h3><p>${q.desc}</p><span class="card-badge">40 questions · 60 min · Pass: 500/800</span>`;
    d.onclick=()=>startQuiz(i);
    el.appendChild(d);
  });
}

function startQuiz(idx){
  S={quiz:idx,qIdx:0,answers:Array.from({length:40},()=>[]),timer:null,timeLeft:3600,answered:false};
  document.getElementById('home').classList.add('hidden');
  document.getElementById('results').style.display='none';
  document.getElementById('quiz').classList.remove('hidden');
  startTimer(); renderQ();
}

function startTimer(){
  clearInterval(S.timer);
  S.timer=setInterval(()=>{S.timeLeft--;updateClock();if(S.timeLeft<=0){clearInterval(S.timer);endQuiz();}},1000);
  updateClock();
}

function updateClock(){
  const el=document.getElementById('timer-display');
  const m=Math.floor(S.timeLeft/60),s=S.timeLeft%60;
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-clock'+(S.timeLeft<300?' danger':S.timeLeft<600?' warning':'');
}

function renderQ(){
  const q=QUIZZES[S.quiz].questions[S.qIdx];
  S.answered=false;
  document.getElementById('prog-fill').style.width=((S.qIdx/40)*100)+'%';
  document.getElementById('prog-text').textContent=`${S.qIdx+1} / 40`;
  document.getElementById('btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';
  const K=['A','B','C','D','E'];
  const opts=q.opts.map((o,i)=>`<div class="option" id="opt-${i}" onclick="toggleOpt(${i})"><span class="opt-key">${K[i]}</span><span>${o}</span></div>`).join('');
  document.getElementById('q-container').innerHTML=`
    <div style="border:1px solid var(--border);background:var(--bg2);border-radius:4px;padding:24px;margin-bottom:16px">
      <div class="q-domain" style="color:${DC[q.domain]||'var(--accent)'};border-color:${DC[q.domain]||'var(--accent)'}">${DN[q.domain]||q.domain} · ${q.sub||''}</div>
      <div class="q-num">Question ${S.qIdx+1} of 40</div>
      <div class="q-text">${q.q}</div>
      ${q.multi?'<div class="q-multi-hint">⚠ Select ALL correct answers that apply</div>':''}
      <div class="options">${opts}</div>
      <div class="explanation" id="expl"></div>
    </div>`;
}

function toggleOpt(idx){
  if(S.answered)return;
  const q=QUIZZES[S.quiz].questions[S.qIdx];
  const sel=S.answers[S.qIdx];
  if(q.multi){const p=sel.indexOf(idx);p>=0?sel.splice(p,1):sel.push(idx);}
  else S.answers[S.qIdx]=[idx];
  document.querySelectorAll('.option').forEach(e=>e.classList.remove('selected'));
  S.answers[S.qIdx].forEach(i=>document.getElementById('opt-'+i)?.classList.add('selected'));
}

function checkAnswer(){
  const q=QUIZZES[S.quiz].questions[S.qIdx];
  const sel=S.answers[S.qIdx];
  S.answered=true;
  q.opts.forEach((_,i)=>{
    const el=document.getElementById('opt-'+i);if(!el)return;el.onclick=null;
    if(q.ans.includes(i)&&sel.includes(i))el.className='option correct';
    else if(sel.includes(i))el.className='option wrong';
    else if(q.ans.includes(i))el.className='option missed';
    else el.className='option';
  });
  const ex=document.getElementById('expl');
  ex.innerHTML=`<strong>Explanation:</strong> ${q.exp}`;ex.classList.add('show');
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
}

function nextQuestion(){S.qIdx++;if(S.qIdx>=40){endQuiz();return;}renderQ();}

function endQuiz(){
  clearInterval(S.timer);
  document.getElementById('quiz').classList.add('hidden');
  const qs=QUIZZES[S.quiz].questions;
  let ok=0;
  qs.forEach((q,i)=>{const sel=S.answers[i]||[];if(q.ans.length===sel.length&&q.ans.every(a=>sel.includes(a)))ok++;});
  const pct=ok/40,score=Math.round(200+pct*600),pass=score>=500;
  saveScore(S.quiz,score);
  const ds={};
  qs.forEach((q,i)=>{if(!ds[q.domain])ds[q.domain]={t:0,o:0};ds[q.domain].t++;const sel=S.answers[i]||[];if(q.ans.length===sel.length&&q.ans.every(a=>sel.includes(a)))ds[q.domain].o++;});
  const domRows=Object.entries(ds).map(([d,{t,o}])=>{const p=Math.round(o/t*100),c=DC[d]||'var(--accent)';return `<div class="db-row"><div class="db-label" style="color:${c}">${DN[d]||d}</div><div class="db-bar-track"><div class="db-bar-fill" style="width:${p}%;background:${c}"></div></div><div class="db-pct" style="color:${c}">${p}%</div></div>`;}).join('');
  const K=['A','B','C','D','E'];
  const rev=qs.map((q,i)=>{const sel=S.answers[i]||[];const g=q.ans.length===sel.length&&q.ans.every(a=>sel.includes(a));const st=sel.map(s=>K[s]+'. '+q.opts[s]).join(', ')||'—';const ct=q.ans.map(a=>K[a]+'. '+q.opts[a]).join(', ');return `<div class="review-item"><div class="review-header" onclick="this.nextElementSibling.classList.toggle('open')"><span class="review-icon">${g?'✓':'✗'}</span><span class="review-q-text" style="color:${g?'var(--green)':'var(--red)'}">${i+1}. ${q.q}</span></div><div class="review-body"><div style="margin-bottom:6px"><strong style="color:var(--text-dim)">Your answer:</strong> <span style="color:${g?'var(--green)':'var(--red)'}">${st}</span></div><div style="margin-bottom:6px"><strong style="color:var(--text-dim)">Correct answer:</strong> <span style="color:var(--green)">${ct}</span></div><div style="color:var(--text-dim)">${q.exp}</div></div></div>`;}).join('');
  const res=document.getElementById('results');
  res.style.display='block';
  res.innerHTML=`
    <div style="text-align:center;margin-bottom:30px">
      <div class="score-circle" style="--score-pct:${pct*100}%"><div class="score-val">${score}</div><div class="score-label">/ 800</div></div>
      <div class="result-verdict"><div class="verdict-badge ${pass?'verdict-pass':'verdict-fail'}">${pass?'✓ PASS':'✗ FAIL'}</div><div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Minimum passing score: 500 / 800</div></div>
    </div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val">${ok}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat-box"><div class="stat-val">${40-ok}</div><div class="stat-lbl">Incorrect</div></div>
      <div class="stat-box"><div class="stat-val">${Math.round(pct*100)}%</div><div class="stat-lbl">Score %</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${pass?'var(--green)':'var(--red)'}">${score}</div><div class="stat-lbl">LPI Score</div></div>
    </div>
    <div class="domain-breakdown"><h3>Results by Domain</h3>${domRows}</div>
    <div class="btn-actions" style="margin-bottom:24px">
      <button class="btn btn-green" onclick="retryQuiz()">↺ Retry this quiz</button>
      <button class="btn" onclick="goHome()">← All quizzes</button>
    </div>
    <div>
      <h3 style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">Detailed Review</h3>
      ${rev}
    </div>`;
  window.scrollTo(0,0);buildHome();
}

function retryQuiz(){document.getElementById('results').style.display='none';startQuiz(S.quiz);}
function goHome(){clearInterval(S.timer);document.getElementById('results').style.display='none';document.getElementById('quiz').classList.add('hidden');document.getElementById('home').classList.remove('hidden');buildHome();}

buildHome();
</script>
</body>
</html>
