// ── QUIZ 3 ──────────────────────────────────────────────
{
title: "Quiz 3 — Device, Storage & Applications",
desc: "Sécurité des appareils, malware, disponibilité des données, applications, IoT, Bluetooth et chiffrement du stockage.",
questions: [
{q:"Quel mécanisme de sécurité Linux contrôle l'accès aux ressources au niveau du noyau, au-delà du modèle DAC classique ?",opts:["sudo","SELinux / AppArmor (MAC - Mandatory Access Control)","chmod / chown","PAM (Pluggable Authentication Modules)"],ans:[1],exp:"SELinux (Security-Enhanced Linux) et AppArmor implémentent le MAC qui ajoute des règles de sécurité indépendantes du propriétaire du fichier. Même root peut être limité par des politiques SELinux.",domain:"023",sub:"023.2"},
{q:"Qu'est-ce qu'une mise à jour de sécurité (patch) et pourquoi est-elle critique ?",opts:["Une mise à jour cosmétique de l'interface","Un correctif qui corrige des vulnérabilités exploitables dans un logiciel","Une mise à jour qui ajoute uniquement de nouvelles fonctionnalités","Un outil de sauvegarde automatique"],ans:[1],exp:"Un patch de sécurité corrige des vulnérabilités identifiées (souvent listées dans des CVE). Ne pas appliquer les patches laisse le système exposé à des exploits connus. C'est le vecteur d'attaque le plus fréquent après le phishing.",domain:"023",sub:"023.2"},
{q:"Quel type de malware se déguise en logiciel légitime pour tromper l'utilisateur ?",opts:["Ver (Worm)","Ransomware","Cheval de Troie (Trojan)","Rootkit"],ans:[2],exp:"Un Trojan se présente comme un logiciel utile ou légitime. Une fois exécuté par l'utilisateur, il installe une backdoor, un keylogger ou d'autres malwares. Contrairement aux vers, il ne se propage pas seul.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce qu'un spyware ?",opts:["Un malware qui chiffre les fichiers","Un logiciel qui collecte secrètement des informations sur l'utilisateur et les envoie à un tiers","Un virus se propageant par réseau","Un outil de surveillance légitime des employés"],ans:[1],exp:"Un spyware surveille secrètement les activités de l'utilisateur (frappes clavier, captures d'écran, historique web) et exfiltre ces données. Il peut être intégré dans des logiciels gratuits (adware-spyware).",domain:"023",sub:"023.3"},
{q:"Qu'est-ce qu'un adware ?",opts:["Un logiciel de gestion de publicité légitim","Un logiciel qui affiche des publicités non sollicitées, souvent accompagné de fonctions espion","Un type de ransomware ciblant les agences publicitaires","Un bloqueur de publicités malveillant"],ans:[1],exp:"L'adware affiche des publicités intrusives pour générer des revenus. Souvent livré avec des logiciels gratuits, il peut aussi collecter des données utilisateur. La frontière avec le spyware est mince.",domain:"023",sub:"023.3"},
{q:"Quel outil Linux permet de vérifier l'intégrité des fichiers système contre des modifications malveillantes ?",opts:["ls -la","AIDE (Advanced Intrusion Detection Environment) ou Tripwire","df -h","lsof"],ans:[1],exp:"AIDE et Tripwire créent une base de référence (checksums, permissions) des fichiers système. Des vérifications périodiques détectent toute modification, notamment les rootkits qui modifient les binaires.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce que le chiffrement eCryptfs sous Linux ?",opts:["Un chiffrement de partition entière au niveau bloc","Un chiffrement de niveau fichier permettant de chiffrer des répertoires individuels (home directory)","Un protocole de chiffrement réseau","Un outil de chiffrement des e-mails"],ans:[1],exp:"eCryptfs est un système de fichiers chiffrés au niveau fichier (stacked filesystem). Il chiffre chaque fichier individuellement et est souvent utilisé pour chiffrer les home directories sous Ubuntu.",domain:"022",sub:"022.4"},
{q:"Quel est l'avantage principal d'un chiffrement de disque complet (FDE) ?",opts:["Il protège les données même si le disque est physiquement volé","Il chiffre uniquement les fichiers modifiés récemment","Il accélère les accès disque","Il remplace la nécessité d'un mot de passe système"],ans:[0],exp:"Le Full Disk Encryption (FDE) via LUKS/BitLocker protège toutes les données sur le disque si l'appareil est volé. Sans le mot de passe ou la clé, les données sont illisibles même si le disque est monté sur un autre système.",domain:"022",sub:"022.4"},
{q:"Qu'est-ce que Secure Boot dans le contexte UEFI ?",opts:["Un mode de démarrage en lecture seule","Un mécanisme vérifiant la signature cryptographique du bootloader et du noyau au démarrage","Un chiffrement du BIOS","Un outil de récupération du système"],ans:[1],exp:"Secure Boot vérifie que le bootloader et le noyau sont signés par des clés de confiance avant de les exécuter. Cela protège contre les bootkits et rootkits qui infectent le processus de démarrage.",domain:"023",sub:"023.1"},
{q:"Quels risques de sécurité sont associés aux appareils IoT ?",opts:["Uniquement un risque de consommation électrique excessive","Mots de passe par défaut non changés, firmware non mis à jour, manque de chiffrement","Risque limité car ils ne traitent pas de données sensibles","Uniquement un risque pour le réseau WiFi domestique"],ans:[1],multi:false,exp:"Les IoT présentent de nombreux risques : mots de passe usine non changés, absence de mises à jour, protocoles non sécurisés, manque de chiffrement. Ils constituent souvent le maillon faible d'un réseau.",domain:"023",sub:"023.1"},
{q:"Qu'est-ce qu'une attaque de type 'bluebugging' via Bluetooth ?",opts:["Un déni de service sur interface Bluetooth","L'accès non autorisé à un appareil Bluetooth pour passer des appels ou envoyer des messages","Le vol d'identité via NFC","Un type de ransomware mobile"],ans:[1],exp:"Le bluebugging exploite des vulnérabilités Bluetooth pour prendre le contrôle d'un appareil (passer des appels, lire contacts, SMS). Désactiver Bluetooth quand inutilisé et maintenir le firmware à jour réduisent ce risque.",domain:"023",sub:"023.1"},
{q:"Quelle est la différence entre RAID 1 et une sauvegarde traditionnelle en termes de protection des données ?",opts:["Le RAID 1 est supérieur à une sauvegarde car il est automatique","Le RAID 1 protège contre la panne de disque mais pas contre la suppression accidentelle ou le ransomware ; une sauvegarde hors ligne protège aussi contre ces cas","Une sauvegarde est identique au RAID 1","Le RAID 1 chiffre les données contrairement à la sauvegarde"],ans:[1],exp:"RAID 1 (mirroring) protège contre la défaillance matérielle d'un disque. Mais si vous supprimez un fichier ou si un ransomware chiffre vos données, RAID 1 réplique immédiatement la suppression/chiffrement sur les deux disques.",domain:"023",sub:"023.4"},
{q:"Qu'est-ce que la virtualisation apporte en termes de sécurité ?",opts:["Elle remplace entièrement les mécanismes de sécurité du système hôte","Elle permet l'isolation : une VM compromise n'affecte pas directement les autres VMs ou l'hôte","Elle désactive les firewalls pour la performance","Elle rend l'encryption inutile"],ans:[1],exp:"La virtualisation fournit une isolation : chaque VM s'exécute dans son propre espace mémoire et disque. Un malware dans une VM ne peut généralement pas s'échapper vers l'hôte (sauf exploitation d'hyperviseur).",domain:"023",sub:"023.2"},
{q:"Quel mécanisme Linux limite les privilèges d'un processus aux capacités (capabilities) strictement nécessaires ?",opts:["sudo -i","Linux Capabilities (cap_net_admin, cap_sys_admin, etc.)","chmod +s (setuid)","chroot"],ans:[1],exp:"Les Linux Capabilities divisent les privilèges root en unités granulaires. Un processus peut avoir CAP_NET_BIND_SERVICE (port <1024) sans être entièrement root. Cela applique le principe du moindre privilège au niveau des processus.",domain:"023",sub:"023.2"},
{q:"Qu'est-ce qu'un conteneur Docker par rapport à une VM en termes de sécurité ?",opts:["Un conteneur est plus sécurisé car il a son propre noyau","Un conteneur partage le noyau hôte, offrant moins d'isolation qu'une VM ; une faille noyau peut compromettre l'hôte","Un conteneur est identique à une VM sur le plan sécurité","Un conteneur ne peut pas être compromis"],ans:[1],exp:"Les conteneurs partagent le noyau de l'hôte (moins d'isolation). Une VMs a son propre hyperviseur et noyau (plus d'isolation). Les conteneurs compensent avec namespaces, cgroups, seccomp et SELinux/AppArmor.",domain:"023",sub:"023.2"},
{q:"Quel type d'analyse de malware consiste à exécuter le code dans un environnement contrôlé pour observer son comportement ?",opts:["Analyse statique","Reverse engineering","Analyse dynamique / sandbox","Analyse forensique post-mortem"],ans:[2],exp:"L'analyse dynamique (sandboxing) exécute le malware dans un environnement isolé et surveille : fichiers créés, connexions réseau, clés registre modifiées. Cuckoo Sandbox est un exemple d'outil open source.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce que le principe de 'defense in depth' (défense en profondeur) ?",opts:["Utiliser un seul firewall très puissant","Mettre en place plusieurs couches de sécurité indépendantes pour qu'un attaquant contournant une couche trouve encore d'autres obstacles","Concentrer toute la sécurité sur le périmètre réseau","Sécuriser uniquement les données les plus critiques"],ans:[1],exp:"La défense en profondeur empile plusieurs contrôles de sécurité : pare-feu périmétrique, segmentation réseau, EDR sur les hôtes, chiffrement des données, authentification forte, surveillance. Chaque couche compense les limites des autres.",domain:"021",sub:"021.2"},
{q:"Qu'est-ce qu'une vulnérabilité zero-day ?",opts:["Une vulnérabilité exploitée exactement à minuit","Une faille inconnue du fournisseur ou sans patch disponible, exploitable immédiatement","Une vulnérabilité de niveau critique découverte il y a exactement 0 jour","Un bug qui se manifeste uniquement au démarrage du système"],ans:[1],exp:"Un zero-day est une vulnérabilité inconnue du fournisseur du logiciel (ou connue mais sans correctif). L'attaquant a 'zéro jour' de répit au défenseur. Ces exploits sont très précieux sur le marché noir.",domain:"021",sub:"021.2"},
{q:"Quels outils permettent de chiffrer un répertoire ou un système de fichiers sur Linux ?",opts:["LUKS/dm-crypt","eCryptfs","VeraCrypt","Tous les précédents"],ans:[3],multi:false,exp:"LUKS/dm-crypt chiffre au niveau bloc (partitions entières), eCryptfs au niveau fichier (répertoires), VeraCrypt crée des volumes chiffrés portables. Chacun a ses cas d'usage selon le besoin.",domain:"022",sub:"022.4"},
{q:"Qu'est-ce qu'un enregistrement SPF (Sender Policy Framework) dans le DNS ?",opts:["Un enregistrement indiquant les serveurs de mail autorisés à envoyer des e-mails pour un domaine","Un certificat TLS pour le serveur mail","Un mécanisme de chiffrement des e-mails","Un outil de filtrage anti-spam côté client"],ans:[0],exp:"SPF est un enregistrement DNS TXT listant les serveurs IP autorisés à envoyer des e-mails au nom du domaine. Le serveur destinataire vérifie l'IP de l'expéditeur contre cette liste. Il lutte contre le spoofing.",domain:"022",sub:"022.3"},
{q:"Dans quel cas utilise-t-on une clé de récupération LUKS ?",opts:["Pour accélérer le déchiffrement du disque","Pour déchiffrer le volume si le mot de passe principal est oublié ou si le slot de clé principal est corrompu","Pour chiffrer le disque avec un algorithme de récupération spécial","LUKS ne supporte pas les clés de récupération"],ans:[1],exp:"LUKS supporte jusqu'à 8 slots de clés. Une clé de récupération (passphrase ou fichier de clé) stockée en lieu sûr permet d'accéder au volume si le mot de passe principal est perdu ou si le header LUKS est partiellement corrompu.",domain:"022",sub:"022.4"},
{q:"Quel type d'attaque vise les mots de passe en utilisant des listes de mots courants ?",opts:["Attaque par force brute pure","Attaque par dictionnaire","Attaque par table arc-en-ciel","Attaque de type Birthday"],ans:[1],exp:"L'attaque par dictionnaire utilise des listes de mots courants, variantes et combinaisons fréquentes. Plus efficace que la force brute pure. Les outils comme hashcat ou John the Ripper intègrent les deux approches.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce que le sandboxing d'applications sur un OS mobile ?",opts:["Le chiffrement des données de l'application","L'isolation de chaque application dans son propre espace, l'empêchant d'accéder aux données des autres apps","La limitation de la consommation CPU de l'application","La vérification de la signature de l'application avant installation"],ans:[1],exp:"Android et iOS isolent chaque application dans son propre sandbox : espace mémoire séparé, accès limité au système de fichiers et aux APIs. Une app malveillante ne peut pas lire les données d'une autre app sans permission explicite.",domain:"023",sub:"023.2"},
{q:"Qu'est-ce que le principe de 'fail-safe defaults' en sécurité ?",opts:["Un système qui redémarre automatiquement en cas de panne","Par défaut, tout accès est refusé ; les autorisations doivent être explicitement accordées","Un système de sauvegarde automatique en cas de défaillance","Les paramètres par défaut doivent être les plus sécurisés possibles"],ans:[1],exp:"Fail-safe defaults : le comportement par défaut d'un système doit être de refuser l'accès. Les droits doivent être accordés explicitement, pas par défaut. C'est l'inverse du 'fail-open' qui laisserait tout passer en cas de problème.",domain:"021",sub:"021.1"},
{q:"Quelle commande Linux affiche les processus en cours et leur utilisation des ressources ?",opts:["ps aux / top / htop","ls -la /proc","df -h","netstat -s"],ans:[0],exp:"ps aux liste tous les processus. top et htop affichent en temps réel. Ces outils permettent de détecter des processus malveillants (malware) consommant anormalement le CPU ou la mémoire.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce qu'un filtre egress (sortant) dans un pare-feu ?",opts:["Un filtre bloquant le trafic entrant","Un filtre contrôlant le trafic sortant du réseau, limitant l'exfiltration de données","Un outil d'inspection des paquets entrants","Un proxy inverse pour les connexions sortantes"],ans:[1],exp:"Le filtrage egress contrôle le trafic sortant : il peut bloquer les connexions vers des domaines malveillants, limiter l'exfiltration de données par des malwares, ou restreindre les applications autorisées à accéder à Internet.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que la journalisation (logging) sécurisée et pourquoi est-elle importante ?",opts:["Stocker les logs en RAM pour la vitesse","Enregistrer les événements système et les envoyer vers un serveur distant (SIEM) pour audit et détection d'incidents","Supprimer les logs après 24h pour économiser de l'espace","Chiffrer les logs avec une clé perdue"],ans:[1],exp:"Une bonne journalisation enregistre les événements importants (connexions, erreurs, actions admin) et les centralise sur un serveur distant (SIEM). Un attaquant qui comprend un système effacera les logs locaux ; les logs distants préservent la traçabilité.",domain:"021",sub:"021.2"},
{q:"Qu'est-ce qu'un 'air gap' (isolation physique) en sécurité ?",opts:["Un espace vide dans un rack serveur","Un réseau totalement isolé physiquement d'Internet et d'autres réseaux non fiables","Un tunnel VPN entre deux sites","Un pare-feu sans état"],ans:[1],exp:"Un air gap est une isolation physique totale : aucun câble, WiFi ou connexion externe. Utilisé pour les systèmes critiques (centrales nucléaires, réseaux classifiés). Des attaques sophistiquées contournent l'air gap via ultrasons, LED ou signaux électromagnétiques.",domain:"023",sub:"023.1"},
{q:"Que fait la commande 'gpg --encrypt --recipient alice@example.com fichier.txt' ?",opts:["Chiffre fichier.txt avec la clé privée de l'utilisateur courant","Chiffre fichier.txt avec la clé publique d'Alice, seule sa clé privée permettant le déchiffrement","Signe fichier.txt avec la clé publique d'Alice","Génère une paire de clés pour alice@example.com"],ans:[1],exp:"Cette commande GPG chiffre le fichier avec la clé publique d'Alice. Seule Alice (détentrice de la clé privée correspondante) pourra déchiffrer avec 'gpg --decrypt'. C'est le paradigme du chiffrement asymétrique.",domain:"022",sub:"022.3"},
{q:"Qu'est-ce que la gestion des vulnérabilités (vulnerability management) ?",opts:["L'installation ponctuelle de mises à jour","Un processus continu d'identification, évaluation, priorisation et correction des vulnérabilités d'un système","Un outil de détection d'intrusion","La gestion des accès utilisateurs"],ans:[1],exp:"La gestion des vulnérabilités est un cycle continu : découverte (scan), évaluation (CVSS score), priorisation (risque business), remédiation (patch), vérification. Des outils comme OpenVAS, Nessus ou Qualys automatisent ce processus.",domain:"021",sub:"021.2"},
{q:"Quel protocole remplace Telnet pour l'administration sécurisée de serveurs distants ?",opts:["FTP","SSH (Secure Shell)","SNMP","HTTP Basic Auth"],ans:[1],exp:"SSH chiffre intégralement la session d'administration (commandes, données, mots de passe). Telnet transmet tout en clair. SSH offre aussi le port forwarding, le SFTP et l'authentification par clé.",domain:"024",sub:"024.1"},
{q:"Quelle technique permet de limiter les risques d'infection par malware lors de la navigation web ?",opts:["Utiliser uniquement HTTP pour éviter les certificats frauduleux","Désactiver les mises à jour automatiques du navigateur","Utiliser un bloqueur de publicités/scripts et maintenir le navigateur à jour","Autoriser tous les popups pour ne pas manquer d'information"],ans:[2],exp:"Un bloqueur de scripts/pub (uBlock Origin, NoScript) empêche l'exécution de code malveillant via publicités malveillantes (malvertising). Un navigateur à jour corrige les CVE exploitées via des drive-by downloads.",domain:"023",sub:"023.2"},
{q:"Qu'est-ce qu'une attaque par rebond (pivoting) dans le contexte d'une intrusion ?",opts:["Redémarrer un serveur pour effacer les traces","Utiliser un système compromis comme point de départ pour attaquer d'autres systèmes du réseau interne","Faire rebondir des requêtes DNS","Utiliser un proxy pour masquer son IP"],ans:[1],exp:"Le pivoting consiste à utiliser un hôte compromis comme relais pour atteindre des systèmes moins exposés du réseau interne. C'est pour cela que la segmentation réseau et la surveillance du trafic interne sont importantes.",domain:"024",sub:"024.2"},
{q:"Lesquels de ces éléments font partie d'une politique de mot de passe robuste ?",opts:["Longueur minimale de 12+ caractères","Vérification contre les bases de mots de passe compromis (ex: HaveIBeenPwned)","Obligation de changer le mot de passe tous les 30 jours","Complexité : mélange majuscules, minuscules, chiffres, symboles"],ans:[0,1,3],multi:true,exp:"NIST SP 800-63B recommande : longueur élevée (12+ chars), vérification contre les listes de compromission, complexité. Le changement forcé fréquent est déconseillé car il pousse les utilisateurs à des mots de passe prévisibles.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce qu'un certificat d'Extended Validation (EV) par rapport à un certificat DV ?",opts:["Un certificat EV est identique à un DV mais plus cher","Un certificat EV implique une vérification rigoureuse de l'identité juridique de l'organisation, contrairement au DV qui vérifie seulement la propriété du domaine","Un certificat EV est auto-signé","Un certificat DV offre plus de sécurité technique qu'un EV"],ans:[1],exp:"DV (Domain Validated) : la CA vérifie uniquement que le demandeur contrôle le domaine. EV (Extended Validation) : vérification approfondie de l'identité légale de l'organisation. EV était identifiable par la barre verte (abandonnée dans les navigateurs modernes).",domain:"022",sub:"022.2"},
{q:"Quelle commande Linux permet de créer un volume chiffré LUKS ?",opts:["mkfs.ext4 /dev/sdb1","cryptsetup luksFormat /dev/sdb1","fdisk /dev/sdb","gpg --symmetric /dev/sdb1"],ans:[1],exp:"'cryptsetup luksFormat' initialise le volume LUKS en définissant la passphrase et les paramètres de chiffrement. Ensuite, 'cryptsetup luksOpen' ouvre le volume, 'mkfs' crée le système de fichiers, et 'mount' monte le volume.",domain:"022",sub:"022.4"},
]
},

// ── QUIZ 4 ──────────────────────────────────────────────
{
title: "Quiz 4 — Examen Blanc Complet",
desc: "Simulation complète couvrant tous les domaines en proportion pondérée, proche du format Pearson VUE.",
questions: [
{q:"Lequel de ces objectifs de sécurité garantit que les services restent accessibles aux utilisateurs légitimes ?",opts:["Confidentialité","Intégrité","Disponibilité","Non-répudiation"],ans:[2],exp:"La disponibilité (Availability) garantit que les systèmes et données sont accessibles quand nécessaire. C'est un des trois piliers CIA. Les attaques DoS/DDoS ciblent spécifiquement la disponibilité.",domain:"021",sub:"021.1"},
{q:"Quelle est la différence entre une vulnérabilité et une menace ?",opts:["Aucune, ce sont des synonymes","Une vulnérabilité est une faiblesse exploitable ; une menace est un acteur ou événement pouvant exploiter cette faiblesse","Une menace est technique, une vulnérabilité est humaine","Une vulnérabilité concerne les réseaux, une menace concerne les applications"],ans:[1],exp:"Vulnérabilité = faiblesse (bug, mauvaise config). Menace = acteur/événement pouvant exploiter une vulnérabilité. Risque = probabilité × impact d'exploitation. Ces trois concepts sont fondamentaux en gestion du risque.",domain:"021",sub:"021.2"},
{q:"Dans quel cas est-il légalement et éthiquement acceptable d'effectuer un test de pénétration ?",opts:["Quand on pense que le système est vulnérable","Quand on obtient une autorisation écrite explicite du propriétaire du système","Quand on est employé de l'entreprise cible","Quand on utilise uniquement des outils open source"],ans:[1],exp:"Le test de pénétration sans autorisation explicite est illégal dans la plupart des pays. Une autorisation écrite (scope, limites, durée) est indispensable. L'éthique impose également de ne pas divulguer les informations obtenues.",domain:"021",sub:"021.3"},
{q:"Qu'est-ce que la cryptographie symétrique et quelle est sa limitation principale ?",opts:["Elle utilise deux clés différentes ; limitation : complexité mathématique","Elle utilise la même clé pour chiffrer et déchiffrer ; limitation : distribution sécurisée de la clé","Elle est uniquement utilisable pour le hachage ; limitation : irréversibilité","Elle est basée sur des certificats ; limitation : coût des CA"],ans:[1],exp:"En cryptographie symétrique (AES, ChaCha20), la même clé chiffre et déchiffre. Le problème fondamental est : comment partager la clé de façon sécurisée ? La cryptographie asymétrique résout ce problème (échange de clé Diffie-Hellman).",domain:"022",sub:"022.1"},
{q:"Qu'est-ce que la signature numérique d'un document garantit-elle ?",opts:["La confidentialité du document","L'authenticité de l'auteur et l'intégrité du document","Le chiffrement du document pour le destinataire","L'anonymat de l'expéditeur"],ans:[1],exp:"Une signature numérique utilise la clé privée de l'auteur. Elle garantit : authenticité (seul l'auteur a la clé privée) et intégrité (toute modification invalide la signature). Elle ne chiffre pas le document.",domain:"022",sub:"022.1"},
{q:"Quel indicateur dans un navigateur web confirme qu'une connexion HTTPS est établie avec le bon site ?",opts:["La présence du mot 'http://' dans l'URL","L'icône cadenas et le nom de domaine correspondant au certificat","La couleur verte de la page web","La rapidité de chargement de la page"],ans:[1],exp:"L'icône cadenas indique que TLS est actif. Le certificat présenté doit correspondre au domaine visité. Si le nom ne correspond pas, le navigateur affiche une erreur de certificat. Cela prévient les attaques MitM.",domain:"022",sub:"022.2"},
{q:"Lequel de ces protocoles assure la confidentialité et l'intégrité du trafic web par défaut ?",opts:["HTTP","HTTPS (TLS 1.2 ou 1.3)","FTP","SNMP v1"],ans:[1],exp:"HTTPS utilise TLS pour chiffrer les communications HTTP. HTTP, FTP et SNMP v1 transmettent les données en clair. SNMP v3 est la version sécurisée de SNMP.",domain:"022",sub:"022.2"},
{q:"Qu'est-ce que S/MIME et dans quel contexte est-il utilisé ?",opts:["Un protocole de tunneling VPN","Un standard de sécurisation des e-mails via chiffrement et/ou signature avec des certificats X.509","Un protocole de transfert de fichiers sécurisé","Un mécanisme d'authentification web"],ans:[1],exp:"S/MIME (Secure/Multipurpose Internet Mail Extensions) utilise des certificats X.509 pour signer et/ou chiffrer les e-mails. Contrairement à PGP, il s'intègre nativement dans Outlook, Apple Mail et d'autres clients.",domain:"022",sub:"022.3"},
{q:"Quel type de chiffrement est utilisé pour sécuriser les communications TLS lors de l'établissement d'une session ?",opts:["Uniquement du chiffrement symétrique","Chiffrement asymétrique pour l'échange de clés, puis symétrique pour les données","Uniquement du chiffrement asymétrique","Hachage MD5 pour la confidentialité"],ans:[1],exp:"TLS utilise un handshake asymétrique (RSA ou Diffie-Hellman) pour établir une clé de session secrète, puis bascule sur le chiffrement symétrique (AES) pour les données, plus performant pour de gros volumes.",domain:"022",sub:"022.1"},
{q:"Qu'est-ce qu'un virus informatique ?",opts:["Tout programme malveillant","Un malware qui s'attache à un fichier légitime et se réplique lors de l'exécution de l'hôte","Un malware qui se propage sans fichier hôte","Un logiciel de surveillance légitime"],ans:[1],exp:"Un virus s'attache à un fichier existant (exécutable, document) et se propage quand l'hôte est exécuté/ouvert. Contrairement aux vers (autonomes) ou aux trojans (se déguisent), les virus ont besoin d'un fichier hôte pour se propager.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce que le BYOD (Bring Your Own Device) comme politique implique comme risques de sécurité ?",opts:["Aucun risque supplémentaire si l'employé est de confiance","Accès aux données d'entreprise depuis des appareils non maîtrisés, potentiellement non patchés ou compromis","Uniquement un risque de vol physique du matériel","Des risques uniquement pour les données personnelles de l'employé"],ans:[1],exp:"Le BYOD introduit des appareils hors du contrôle IT de l'entreprise : OS non à jour, applications non validées, accès à des réseaux WiFi publics, mélange données pro/perso. Les solutions MDM (Mobile Device Management) aident à gérer ce risque.",domain:"023",sub:"023.1"},
{q:"Quel commande Linux permet de tester la connectivité réseau et la résolution DNS d'un hôte ?",opts:["ls -la","ping hostname && dig hostname","df -h","chmod 755 hostname"],ans:[1],exp:"ping vérifie la connectivité ICMP vers un hôte. dig (ou nslookup) effectue des requêtes DNS. Ces deux outils sont fondamentaux pour diagnostiquer les problèmes réseau et vérifier la configuration DNS.",domain:"024",sub:"024.1"},
{q:"Qu'est-ce qu'une attaque de type 'phishing spear' (spear phishing) ?",opts:["Un phishing envoyé à des milliers de personnes aléatoirement","Un phishing personnalisé ciblant une personne ou organisation spécifique avec des informations collectées au préalable","Un phishing via SMS","Un phishing ciblant uniquement les PDG (whaling)"],ans:[1],exp:"Le spear phishing est hautement ciblé : l'attaquant utilise des informations personnelles (nom, poste, collègues) pour créer un e-mail crédible. Taux de succès bien supérieur au phishing générique. Le whaling est le spear phishing ciblant des dirigeants.",domain:"025",sub:"025.2"},
{q:"Qu'est-ce qu'un pare-feu applicatif (WAF - Web Application Firewall) ?",opts:["Un firewall réseau standard avec règles IP","Un firewall spécialisé qui inspecte le trafic HTTP/HTTPS et protège contre les attaques web (SQLi, XSS)","Un proxy de cache web","Un IDS réseau générique"],ans:[1],exp:"Un WAF analyse le contenu des requêtes HTTP pour bloquer les attaques applicatives : SQL injection, XSS, CSRF, path traversal. Il opère au niveau applicatif (couche 7) contrairement aux firewalls réseau (couches 3-4).",domain:"024",sub:"024.2"},
{q:"Quel protocole permet à un client de vérifier en temps réel si un certificat TLS est révoqué ?",opts:["CRL (Certificate Revocation List)","OCSP (Online Certificate Status Protocol)","HSTS","Certificate Transparency"],ans:[1],exp:"OCSP permet une vérification en temps réel de la révocation d'un certificat en interrogeant le serveur OCSP de la CA. La CRL est moins efficace (téléchargement de listes volumineuses potentiellement non à jour).",domain:"022",sub:"022.1"},
{q:"Qu'est-ce que le chiffrement homomorphe ?",opts:["Un chiffrement identique pour tous les utilisateurs","Un type de chiffrement permettant d'effectuer des calculs sur des données chiffrées sans les déchiffrer","Le chiffrement de la relation entre les données","Un chiffrement bi-directionnel entre deux parties"],ans:[1],exp:"Le chiffrement homomorphe permet de déléguer des calculs (ex: à un cloud) sur des données chiffrées, et d'obtenir un résultat chiffré équivalent au calcul sur les données en clair. C'est une technologie émergente aux applications prometteuses.",domain:"022",sub:"022.1"},
{q:"Qu'est-ce que la technique de 'typosquatting' (ou cybersquatting) ?",opts:["Une attaque par injection de code dans les URLs","L'enregistrement de noms de domaine similaires (avec fautes de frappe) à des sites légitimes pour tromper les utilisateurs","Une attaque DDoS utilisant des domaines compromis","Un empoisonnement de cache DNS"],ans:[1],exp:"Le typosquatting exploite les erreurs de frappe : 'gooogle.com', 'paypa1.com'. L'utilisateur arrive sur un site malveillant visuellement identique à l'original et entre ses identifiants. Vérifier attentivement les URLs est essentiel.",domain:"025",sub:"025.2"},
{q:"Que signifie 'chiffrement de bout en bout' dans une application de messagerie ?",opts:["Le serveur de messagerie peut lire les messages mais pas les fournisseurs réseau","Seuls l'émetteur et le destinataire peuvent lire les messages ; le serveur ne stocke que des données chiffrées","Le trafic est chiffré uniquement entre l'app et le serveur","Le chiffrement est activé de bout en bout de la journée"],ans:[1],exp:"E2EE en messagerie (Signal, WhatsApp) : les clés de déchiffrement restent sur les appareils des utilisateurs. Le serveur relaye des données chiffrées qu'il ne peut pas lire. Une compromission du serveur n'expose pas le contenu des messages.",domain:"024",sub:"024.3"},
{q:"Quel outil Linux est utilisé pour configurer le pare-feu Netfilter ?",opts:["iptables / nftables","ufw (qui est un frontend pour iptables)","firewalld","Tous les précédents peuvent configurer Netfilter"],ans:[3],multi:false,exp:"iptables, nftables, ufw et firewalld sont tous des interfaces pour configurer Netfilter (le framework de filtrage du noyau Linux). nftables remplace progressivement iptables. ufw et firewalld sont des frontends simplifiés.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que la 'surface d'attaque' (attack surface) d'un système ?",opts:["La surface physique des serveurs dans le datacenter","L'ensemble des points d'entrée potentiels qu'un attaquant peut tenter d'exploiter","La taille de la base de code d'une application","Le nombre d'administrateurs ayant accès au système"],ans:[1],exp:"La surface d'attaque englobe tous les vecteurs potentiels : ports ouverts, services actifs, APIs exposées, interfaces utilisateur, bibliothèques tierces, utilisateurs avec accès. Réduire la surface d'attaque diminue le risque.",domain:"021",sub:"021.2"},
{q:"Quelle propriété cryptographique garantit qu'il est impossible de retrouver l'entrée à partir de la sortie d'une fonction de hachage ?",opts:["Unicité","Résistance à la préimage (one-way property)","Déterminisme","Collision-resistance"],ans:[1],exp:"La résistance à la préimage garantit qu'à partir du hash h, il est computationnellement impossible de trouver m tel que hash(m) = h. C'est la propriété 'sens unique' essentielle pour le stockage sécurisé des mots de passe.",domain:"022",sub:"022.1"},
{q:"Qu'est-ce que DMARC (Domain-based Message Authentication, Reporting and Conformance) ?",opts:["Un protocole de chiffrement des e-mails","Une politique qui spécifie comment traiter les e-mails qui échouent les vérifications SPF ou DKIM","Un mécanisme de signature TLS pour les serveurs mail","Un système de filtrage anti-spam basé sur le contenu"],ans:[1],exp:"DMARC (DNS TXT) définit la politique : quarantaine ou rejet des e-mails qui ne passent pas SPF/DKIM. Il fournit aussi des rapports aux propriétaires de domaines sur les tentatives d'usurpation. Combiné avec SPF et DKIM, il forme le socle anti-spoofing.",domain:"022",sub:"022.3"},
{q:"Qu'est-ce que le 'credential stuffing' ?",opts:["La création de faux identifiants pour l'accès à un système","L'utilisation automatisée d'identifiants volés (login/mot de passe) de brèches précédentes pour tenter de se connecter à d'autres services","Une attaque par force brute sur un seul service","L'injection de credentials dans le code source d'une application"],ans:[1],exp:"Le credential stuffing exploite la réutilisation des mots de passe. Des outils automatisés testent des millions de paires login/mdp volées sur des brèches connues. Solution : mots de passe uniques et 2FA.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce qu'un proxy de navigation anonyme et quelles sont ses limites ?",opts:["Un VPN complet garantissant l'anonymat total","Un intermédiaire masquant l'IP du client au serveur web, mais susceptible d'enregistrer le trafic lui-même","Un pare-feu applicatif","Un outil de chiffrement bout en bout"],ans:[1],exp:"Un proxy web masque l'IP réelle du client vis-à-vis du serveur. Ses limites : le proxy voit tout le trafic (confiance requise), pas de chiffrement bout en bout, les cookies et empreintes navigateur peuvent identifier l'utilisateur.",domain:"024",sub:"024.3"},
{q:"Quelle est la principale différence entre chiffrement et hachage ?",opts:["Le chiffrement est plus rapide","Le chiffrement est réversible (avec la clé) ; le hachage est irréversible","Le hachage utilise une clé, le chiffrement non","Il n'y a aucune différence fonctionnelle"],ans:[1],exp:"Chiffrement : transformation réversible nécessitant une clé (pour déchiffrer). Hachage : transformation irréversible produisant une empreinte de taille fixe. Les mots de passe sont hachés (pas chiffrés) car on n'a jamais besoin de les récupérer.",domain:"022",sub:"022.1"},
{q:"Quel protocole sécurise l'accès aux répertoires LDAP via chiffrement ?",opts:["LDAP (port 389) avec Basic Auth","LDAPS (port 636) ou LDAP avec STARTTLS","LDAP avec MD5 digest","LDAP v2"],ans:[1],exp:"LDAPS encapsule LDAP dans TLS (port 636). STARTTLS peut aussi upgrader une connexion LDAP standard. LDAP en clair (port 389) transmet les données et les mots de passe en clair.",domain:"024",sub:"024.1"},
{q:"Quel mécanisme protège contre la réutilisation d'un token d'authentification intercepté ?",opts:["Les tokens à longue durée de vie","Les tokens à courte durée de vie et les nonces (tokens à usage unique)","Le chiffrement symétrique des tokens","La taille du token (plus il est long, mieux c'est)"],ans:[1],exp:"Les tokens à courte expiration (JWT exp court) et les nonces (valeurs aléatoires à usage unique) limitent la fenêtre d'exploitation si un token est intercepté. HTTPS prévient l'interception elle-même.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce que la géolocalisation des données et pourquoi est-elle importante pour la conformité ?",opts:["La compression géographique des données","La restriction du lieu de stockage et traitement des données selon des lois locales (ex: RGPD impose que les données des citoyens UE restent dans l'UE ou pays adéquats)","La localisation des datacenter pour optimiser la latence","Un outil de tracking utilisateur"],ans:[1],exp:"Le RGPD impose des règles sur les transferts de données hors UE. Les données ne peuvent être transférées que vers des pays offrant un niveau de protection adéquat ou avec des garanties contractuelles (clauses types UE).",domain:"025",sub:"025.3"},
{q:"Quel outil Python/Linux est utilisé pour tester la sécurité d'une application web ?",opts:["Wireshark","OWASP ZAP (Zed Attack Proxy) ou Burp Suite","Nmap","Tripwire"],ans:[1],exp:"OWASP ZAP et Burp Suite sont des proxies d'interception pour tester la sécurité des applications web : injection SQL, XSS, CSRF, etc. Nmap est un scanner réseau. Wireshark analyse le trafic réseau. Tripwire vérifie l'intégrité des fichiers.",domain:"023",sub:"023.2"},
{q:"Qu'est-ce que le principe d'imputabilité (accountability) en sécurité informatique ?",opts:["La capacité de chiffrer les actions des utilisateurs","La possibilité de retracer et d'imputer chaque action à un utilisateur identifié via les logs et l'authentification","La limitation des accès par domaine","Le blocage automatique des comptes inactifs"],ans:[1],exp:"L'imputabilité garantit que chaque action peut être attribuée à une entité identifiée. Elle nécessite : authentification forte (pour identifier l'acteur), journalisation (pour enregistrer les actions), et intégrité des logs (pour garantir la traçabilité).",domain:"021",sub:"021.1"},
{q:"Quels éléments composent la 'triade CIA' de la sécurité de l'information ?",opts:["Chiffrement, Intégrité, Authentification","Confidentialité, Intégrité, Disponibilité","Contrôle, Identification, Autorisation","Cryptographie, Infrastructure, Accès"],ans:[1],multi:false,exp:"La triade CIA (Confidentiality, Integrity, Availability) est le modèle fondamental de la sécurité de l'information. Confidentialité : accès limité aux personnes autorisées. Intégrité : données non altérées. Disponibilité : accès garanti aux utilisateurs légitimes.",domain:"021",sub:"021.1"},
{q:"Quel outil est utilisé pour analyser les captures de trafic réseau (.pcap) ?",opts:["htop","Wireshark / tcpdump","nmap","fail2ban"],ans:[1],exp:"Wireshark offre une interface graphique pour analyser des captures .pcap. tcpdump est l'outil ligne de commande équivalent. Ces outils sont indispensables pour analyser des incidents réseau et comprendre les protocoles.",domain:"024",sub:"024.1"},
{q:"Qu'est-ce que le 'hardening' (durcissement) d'un système Linux ?",opts:["L'installation d'un antivirus","L'ensemble des mesures réduisant la surface d'attaque : désactivation de services, restrictions de permissions, configuration sécurisée","La mise en place d'un RAID pour la disponibilité","L'installation de mises à jour uniquement"],ans:[1],exp:"Le hardening inclut : désactivation des services inutiles, suppression des comptes par défaut, configuration sécurisée des services, restrictions de permissions, activation de SELinux/AppArmor, application des patches. Des guides CIS Benchmarks définissent les bonnes pratiques.",domain:"023",sub:"023.2"},
{q:"Quel protocole réseau permet de synchroniser l'heure de façon sécurisée sur les systèmes Linux ?",opts:["NTP (port 123) sans authentification","NTPsec ou Chrony avec authentification cryptographique","SNTP","ICMP timestamp"],ans:[1],exp:"La synchronisation d'heure est critique pour les logs, Kerberos et les certificats TLS. NTP classique (port 123) est vulnérable à l'amplification DDoS et à la manipulation. NTPsec et Chrony avec clés cryptographiques sécurisent la synchronisation.",domain:"024",sub:"024.1"},
{q:"Qu'est-ce que l'ingénierie sociale de type 'vishing' ?",opts:["Un phishing via message vidéo","Une attaque d'ingénierie sociale par téléphone, se faisant passer pour un support IT ou une banque","Un phishing via VoIP uniquement","Un virus transmis par signal vocal"],ans:[1],exp:"Le vishing (voice phishing) utilise le téléphone pour manipuler des victimes. L'attaquant se fait passer pour le support IT, la banque, ou les impôts pour obtenir des informations sensibles ou faire effectuer des actions (virement, installation de logiciel).",domain:"021",sub:"021.1"},
{q:"Quel outil en ligne de commande Linux teste la résilience d'un serveur SSH contre les attaques ?",opts:["ssh-keyscan","ssh-audit","sshd -T","ssh -v"],ans:[1],exp:"ssh-audit analyse la configuration d'un serveur SSH : algorithmes supportés, version, vulnérabilités connues. Il identifie les algorithmes faibles (MD5, DES) et recommande les configurations sécurisées.",domain:"024",sub:"024.1"},
{q:"Qu'est-ce que la 'pseudonymisation' des données au sens du RGPD ?",opts:["La suppression irréversible des données personnelles","Le remplacement des données directement identifiantes par un identifiant artificiel, la réidentification restant possible avec une clé séparée","Le chiffrement des données sur le disque","L'anonymisation complète des données"],ans:[1],exp:"La pseudonymisation remplace les données identifiantes (nom, email) par un pseudonyme. La réidentification reste possible si on a accès à la table de correspondance. C'est moins protecteur que l'anonymisation complète mais reconnu par le RGPD comme mesure de sécurité.",domain:"025",sub:"025.3"},
{q:"Quelle est la principale utilité d'un gestionnaire de secrets (HashiCorp Vault, AWS Secrets Manager) ?",opts:["Stocker les mots de passe des employés","Gérer et distribuer de façon sécurisée les secrets (clés API, mots de passe, certificats) aux applications, avec audit et rotation automatique","Chiffrer les bases de données de production","Gérer les accès VPN des développeurs"],ans:[1],exp:"Les gestionnaires de secrets centralisent les secrets applicatifs (clés API, DB passwords) avec : contrôle d'accès fin, journalisation, rotation automatique, et distribution sécurisée. Ils évitent le 'secret sprawl' (secrets dans le code source).",domain:"023",sub:"023.2"},
]
}

// Load saved scores
function getSavedScore(idx) {
  try { return JSON.parse(localStorage.getItem('sec_quiz_' + idx)); } catch(e) { return null; }
}
function saveScore(idx, score, total) {
  localStorage.setItem('sec_quiz_' + idx, JSON.stringify({score, total, date: Date.now()}));
}

// ── BUILD HOME ──
function buildHome() {
  const sel = document.getElementById('quiz-select');
  sel.innerHTML = '';
  QUIZZES.forEach((q, i) => {
    const saved = getSavedScore(i);
    const card = document.createElement('div');
    card.className = 'quiz-card';
    let badge = '';
    if (saved) {
      const pct = Math.round(saved.score / 800 * 100);
      badge = `<div class="score-badge ${saved.score >= 500 ? 'score-pass' : 'score-fail'}">${saved.score}/800</div>`;
    }
    card.innerHTML = `
      ${badge}
      <h3>${q.title}</h3>
      <p>${q.desc}</p>
      <span class="card-badge">40 questions · 60 min · 500/800</span>
    `;
    card.onclick = () => startQuiz(i);
    sel.appendChild(card);
  });
}

// ── START QUIZ ──
function startQuiz(idx) {
  state.quiz = idx;
  state.qIdx = 0;
  state.answers = new Array(40).fill(null).map(() => []);
  state.timeLeft = 60 * 60;
  state.answered = false;

  document.getElementById('home').classList.add('hidden');
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').classList.remove('hidden');

  startTimer();
  renderQuestion();
}

// ── TIMER ──
function startTimer() {
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) { clearInterval(state.timer); endQuiz(); }
  }, 1000);
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer-clock';
  if (state.timeLeft < 300) el.classList.add('danger');
  else if (state.timeLeft < 600) el.classList.add('warning');
}

// ── RENDER QUESTION ──
function renderQuestion() {
  const q = QUIZZES[state.quiz].questions[state.qIdx];
  state.answered = false;

  // progress
  const pct = (state.qIdx / 40) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${state.qIdx + 1} / 40`;

  document.getElementById('btn-check').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'none';

  const domColor = DOMAIN_COLORS[q.domain] || 'var(--accent)';
  const domName = DOMAIN_NAMES[q.domain] || q.domain;

  const keys = ['A','B','C','D','E'];
  const opts = q.opts.map((o, i) => `
    <div class="option" id="opt-${i}" onclick="toggleOpt(${i})" data-idx="${i}">
      <span class="opt-key">${keys[i]}</span>
      <span>${o}</span>
    </div>`).join('');

  document.getElementById('q-container').innerHTML = `
    <div style="border:1px solid var(--border);background:var(--bg2);border-radius:4px;padding:24px;margin-bottom:16px;">
      <div class="q-domain" style="color:${domColor};border-color:${domColor};">${domName} · ${q.sub}</div>
      <div class="q-num">Question ${state.qIdx + 1} sur 40</div>
      <div class="q-text">${q.q}</div>
      ${q.multi ? '<div class="q-multi-hint">⚠ Plusieurs réponses correctes possibles</div>' : ''}
      <div class="options" id="options-wrap">${opts}</div>
      <div class="explanation" id="explanation"></div>
    </div>
  `;
}

function toggleOpt(idx) {
  if (state.answered) return;
  const q = QUIZZES[state.quiz].questions[state.qIdx];
  const sel = state.answers[state.qIdx];

  if (q.multi) {
    const pos = sel.indexOf(idx);
    if (pos >= 0) sel.splice(pos, 1);
    else sel.push(idx);
  } else {
    state.answers[state.qIdx] = [idx];
  }

  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  state.answers[state.qIdx].forEach(i => {
    document.getElementById('opt-' + i)?.classList.add('selected');
  });
}

function checkAnswer() {
  const q = QUIZZES[state.quiz].questions[state.qIdx];
  const sel = state.answers[state.qIdx];
  state.answered = true;

  const correct = q.ans;
  const isCorrect = correct.length === sel.length && correct.every(a => sel.includes(a));

  q.opts.forEach((_, i) => {
    const el = document.getElementById('opt-' + i);
    if (!el) return;
    el.onclick = null;
    if (correct.includes(i) && sel.includes(i)) el.className = 'option correct';
    else if (sel.includes(i) && !correct.includes(i)) el.className = 'option wrong';
    else if (correct.includes(i)) el.className = 'option missed';
    else el.className = 'option';
  });

  const expEl = document.getElementById('explanation');
  expEl.innerHTML = `<strong>Explication :</strong> ${q.exp}`;
  expEl.classList.add('show');

  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextQuestion() {
  state.qIdx++;
  if (state.qIdx >= 40) { endQuiz(); return; }
  renderQuestion();
}

// ── END / RESULTS ──
function endQuiz() {
  clearInterval(state.timer);
  document.getElementById('quiz').classList.add('hidden');

  const qs = QUIZZES[state.quiz].questions;
  let correct = 0;
  qs.forEach((q, i) => {
    const sel = state.answers[i] || [];
    if (q.ans.length === sel.length && q.ans.every(a => sel.includes(a))) correct++;
  });

  const rawPct = correct / 40;
  const score = Math.round(200 + rawPct * 600); // LPI 200-800 scale
  const pass = score >= 500;

  saveScore(state.quiz, score, 800);

  // domain stats
  const domStats = {};
  qs.forEach((q, i) => {
    if (!domStats[q.domain]) domStats[q.domain] = {tot:0, ok:0};
    domStats[q.domain].tot++;
    const sel = state.answers[i] || [];
    if (q.ans.length === sel.length && q.ans.every(a => sel.includes(a))) domStats[q.domain].ok++;
  });

  const scorePct = rawPct * 100;
  const circleAngle = `${scorePct}%`;

  let domRows = Object.entries(domStats).map(([dom, {tot, ok}]) => {
    const p = Math.round(ok/tot*100);
    const col = DOMAIN_COLORS[dom];
    return `<div class="db-row">
      <div class="db-label" style="color:${col}">${DOMAIN_NAMES[dom]}</div>
      <div class="db-bar-track"><div class="db-bar-fill" style="width:${p}%;background:${col}"></div></div>
      <div class="db-pct" style="color:${col}">${p}%</div>
    </div>`;
  }).join('');

  // review
  let reviewHTML = qs.map((q, i) => {
    const sel = state.answers[i] || [];
    const ok = q.ans.length === sel.length && q.ans.every(a => sel.includes(a));
    const keys = ['A','B','C','D','E'];
    const selText = sel.map(s => keys[s] + '. ' + q.opts[s]).join(', ') || '—';
    const corrText = q.ans.map(a => keys[a] + '. ' + q.opts[a]).join(', ');
    return `<div class="review-item">
      <div class="review-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="review-icon">${ok ? '✓' : '✗'}</span>
        <span class="review-q-text" style="color:${ok?'var(--green)':'var(--red)'}">${i+1}. ${q.q}</span>
      </div>
      <div class="review-body">
        <div style="margin-bottom:6px"><strong style="color:var(--text-dim)">Votre réponse :</strong> <span style="color:${ok?'var(--green)':'var(--red)'}">${selText}</span></div>
        <div style="margin-bottom:6px"><strong style="color:var(--text-dim)">Bonne réponse :</strong> <span style="color:var(--green)">${corrText}</span></div>
        <div style="color:var(--text-dim)">${q.exp}</div>
      </div>
    </div>`;
  }).join('');

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `
    <div style="text-align:center;margin-bottom:30px;">
      <div class="score-circle" style="--score-pct:${scorePct}%">
        <div class="score-val">${score}</div>
        <div class="score-label">/ 800</div>
      </div>
      <div class="result-verdict">
        <div class="verdict-badge ${pass ? 'verdict-pass' : 'verdict-fail'}">${pass ? '✓ PASS' : '✗ FAIL'}</div>
        <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Score minimum requis : 500 / 800</div>
      </div>
    </div>

    <div class="result-stats">
      <div class="stat-box"><div class="stat-val">${correct}</div><div class="stat-lbl">Correctes</div></div>
      <div class="stat-box"><div class="stat-val">${40-correct}</div><div class="stat-lbl">Incorrectes</div></div>
      <div class="stat-box"><div class="stat-val">${Math.round(scorePct)}%</div><div class="stat-lbl">Score %</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${pass?'var(--green)':'var(--red)'}">${score}</div><div class="stat-lbl">Score LPI</div></div>
    </div>

    <div class="domain-breakdown">
      <h3>Résultats par domaine</h3>
      ${domRows}
    </div>

    <div class="btn-actions" style="margin-bottom:24px;">
      <button class="btn btn-green" onclick="retryQuiz()">↺ Recommencer ce quiz</button>
      <button class="btn" onclick="goHome()">← Choisir un autre quiz</button>
    </div>

    <div class="review-list">
      <h3 style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Révision détaillée</h3>
      ${reviewHTML}
    </div>
  `;

  window.scrollTo(0, 0);
  buildHome(); // refresh scores on home
}

function retryQuiz() {
  document.getElementById('results').style.display = 'none';
  startQuiz(state.quiz);
}

function goHome() {
  clearInterval(state.timer);
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  buildHome();
}

// ── INIT ──
buildHome();
</script>
</body>
</html>
