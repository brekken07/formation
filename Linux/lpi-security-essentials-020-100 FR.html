<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPI Security Essentials 020-100 — Exam Prep</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0d12;
    --bg2: #0f1318;
    --bg3: #141920;
    --border: #1e2730;
    --border2: #2a3545;
    --text: #c8d8e8;
    --text-dim: #6a8090;
    --text-bright: #e8f4ff;
    --accent: #00c8ff;
    --accent2: #0090cc;
    --green: #00e890;
    --red: #ff4060;
    --orange: #ffaa00;
    --purple: #bb80ff;
    --yellow: #ffdd44;

    /* domain colors */
    --d021: #00c8ff;
    --d022: #bb80ff;
    --d023: #00e890;
    --d024: #ffaa00;
    --d025: #ff6688;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }
  .logo-line {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  h1 span { color: var(--accent); }
  .exam-meta {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .meta-item {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .meta-item strong { color: var(--accent); }

  /* ── DOMAIN LEGEND ── */
  .domain-legend {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 24px;
  }
  .domain-tag {
    font-size: 10px; letter-spacing: 1px; padding: 4px 10px;
    border-radius: 2px; font-weight: 600;
    border: 1px solid currentColor;
    opacity: 0.75;
  }
  .domain-tag.d021 { color: var(--d021); }
  .domain-tag.d022 { color: var(--d022); }
  .domain-tag.d023 { color: var(--d023); }
  .domain-tag.d024 { color: var(--d024); }
  .domain-tag.d025 { color: var(--d025); }

  /* ── QUIZ SELECT ── */
  #quiz-select {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }
  .quiz-card {
    border: 1px solid var(--border);
    background: var(--bg2);
    padding: 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity .2s;
  }
  .quiz-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
  .quiz-card:hover::before { opacity: 1; }
  .quiz-card h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem; font-weight: 600; color: var(--text-bright);
    margin-bottom: 6px;
  }
  .quiz-card p { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .quiz-card .card-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border: 1px solid var(--border2); color: var(--text-dim);
    margin-top: 10px; border-radius: 2px;
  }
  .quiz-card .score-badge {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; padding: 2px 8px;
    border-radius: 2px; font-weight: 600;
  }
  .score-pass { background: rgba(0,232,144,0.15); color: var(--green); border: 1px solid var(--green); }
  .score-fail { background: rgba(255,64,96,0.15); color: var(--red); border: 1px solid var(--red); }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .progress-bar-track {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px; transition: width .3s;
  }
  .progress-text { font-size: 11px; color: var(--text-dim); min-width: 70px; text-align: right; }

  /* ── TIMER ── */
  .timer-wrap {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim);
  }
  .timer-clock {
    font-size: 1.1rem; font-weight: 700; color: var(--accent);
    min-width: 56px; text-align: center;
    padding: 4px 8px; border: 1px solid var(--border2); border-radius: 3px;
    background: var(--bg2);
    transition: color .3s;
  }
  .timer-clock.warning { color: var(--orange); border-color: var(--orange); }
  .timer-clock.danger  { color: var(--red);    border-color: var(--red);   animation: blink .8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }

  /* ── QUESTION CARD ── */
  .q-domain {
    font-size: 10px; letter-spacing: 2px; font-weight: 600;
    padding: 3px 10px; border-radius: 2px; border: 1px solid currentColor;
    display: inline-block; margin-bottom: 14px;
  }
  .q-num {
    font-size: 11px; color: var(--text-dim); margin-bottom: 8px;
  }
  .q-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem; font-weight: 500;
    color: var(--text-bright); line-height: 1.6;
    margin-bottom: 20px;
  }
  .q-multi-hint {
    font-size: 10px; color: var(--orange); letter-spacing: 1px;
    margin-bottom: 14px; padding: 4px 10px;
    border: 1px solid rgba(255,170,0,0.3);
    background: rgba(255,170,0,0.05);
    border-radius: 2px; display: inline-block;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 12px 16px; border: 1px solid var(--border);
    background: var(--bg2); border-radius: 3px;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: flex-start; gap: 12px;
    font-size: 0.95rem; line-height: 1.5;
  }
  .option:hover { border-color: var(--accent2); background: var(--bg3); }
  .option.selected { border-color: var(--accent); background: rgba(0,200,255,0.07); }
  .option.correct  { border-color: var(--green); background: rgba(0,232,144,0.07); color: var(--green); }
  .option.wrong    { border-color: var(--red);   background: rgba(255,64,96,0.07);  color: var(--red);   }
  .option.missed   { border-color: var(--green); background: rgba(0,232,144,0.05); text-decoration: none; }
  .option .opt-key {
    font-size: 10px; font-weight: 700; min-width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid currentColor; border-radius: 2px; margin-top: 1px; opacity: .7;
    flex-shrink: 0;
  }

  /* ── EXPLANATION ── */
  .explanation {
    margin-top: 18px; padding: 14px 16px;
    border-left: 3px solid var(--accent2);
    background: rgba(0,144,204,0.06);
    font-size: 0.9rem; line-height: 1.7;
    color: var(--text-dim);
    border-radius: 0 3px 3px 0;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 10px 24px; border-radius: 3px;
    border: 1px solid var(--accent2); color: var(--accent);
    background: rgba(0,200,255,0.05);
    cursor: pointer; transition: all .2s;
  }
  .btn:hover { background: rgba(0,200,255,0.12); border-color: var(--accent); }
  .btn-green { border-color: var(--green); color: var(--green); background: rgba(0,232,144,0.05); }
  .btn-green:hover { background: rgba(0,232,144,0.12); }
  .btn-red { border-color: var(--red); color: var(--red); background: rgba(255,64,96,0.05); }
  .btn-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px; }

  /* ── RESULTS ── */
  #results { display: none; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    border: 3px solid var(--border2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }
  .score-circle::before {
    content: '';
    position: absolute; inset: -3px; border-radius: 50%;
    background: conic-gradient(var(--accent) var(--score-pct), var(--border) 0);
    z-index: -1;
    transition: all 1s;
  }
  .score-circle .score-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.2rem; font-weight: 700; color: var(--text-bright);
  }
  .score-circle .score-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

  .result-verdict {
    text-align: center; margin-bottom: 30px;
  }
  .verdict-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem; font-weight: 700; letter-spacing: 3px;
    padding: 8px 28px; border-radius: 3px; display: inline-block;
  }
  .verdict-pass { border: 2px solid var(--green); color: var(--green); background: rgba(0,232,144,0.08); }
  .verdict-fail { border: 2px solid var(--red);   color: var(--red);   background: rgba(255,64,96,0.08);  }

  .result-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .stat-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 3px; padding: 14px; text-align: center;
  }
  .stat-box .stat-val {
    font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700;
    color: var(--text-bright);
  }
  .stat-box .stat-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 4px; }

  .domain-breakdown { margin-bottom: 28px; }
  .domain-breakdown h3 {
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
    color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .db-row {
    display: grid; grid-template-columns: 200px 1fr 50px;
    align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .db-label { font-size: 11px; color: var(--text-dim); }
  .db-bar-track { background: var(--border); height: 6px; border-radius: 3px; overflow: hidden; }
  .db-bar-fill { height: 100%; border-radius: 3px; transition: width 1s; }
  .db-pct { font-size: 11px; text-align: right; font-weight: 600; }

  .review-list { margin-top: 20px; }
  .review-item {
    border: 1px solid var(--border); border-radius: 3px;
    margin-bottom: 10px; overflow: hidden;
  }
  .review-header {
    padding: 12px 16px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); transition: background .15s;
  }
  .review-header:hover { background: var(--bg3); }
  .review-icon { font-size: 14px; flex-shrink: 0; }
  .review-q-text { font-size: 12px; flex: 1; line-height: 1.4; }
  .review-body { padding: 14px 16px; background: var(--bg); display: none; font-size: 12px; }
  .review-body.open { display: block; }

  /* ── GLOBAL HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo-line">Linux Professional Institute</div>
  <h1>Security <span>Essentials</span></h1>
  <div class="exam-meta">
    <div class="meta-item">Exam Code: <strong>020-100</strong></div>
    <div class="meta-item">Questions: <strong>40</strong></div>
    <div class="meta-item">Durée: <strong>60 min</strong></div>
    <div class="meta-item">Score cible: <strong>500 / 800</strong></div>
  </div>
</header>

<!-- QUIZ SELECTION -->
<div id="home">
  <div class="domain-legend">
    <span class="domain-tag d021">021 Security Concepts</span>
    <span class="domain-tag d022">022 Encryption</span>
    <span class="domain-tag d023">023 Device &amp; Storage</span>
    <span class="domain-tag d024">024 Network &amp; Services</span>
    <span class="domain-tag d025">025 Identity &amp; Privacy</span>
  </div>
  <div id="quiz-select"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <div class="top-bar">
    <div class="progress-wrap" style="flex:1; min-width:200px;">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-text" id="prog-text">0 / 40</div>
    </div>
    <div class="timer-wrap">
      <span style="font-size:10px;letter-spacing:1px;color:var(--text-dim)">TEMPS</span>
      <div class="timer-clock" id="timer-display">60:00</div>
    </div>
  </div>

  <div id="q-container"></div>

  <div class="btn-actions" id="q-actions">
    <button class="btn" id="btn-check" onclick="checkAnswer()">Valider</button>
    <button class="btn" id="btn-next" onclick="nextQuestion()" style="display:none">Suivant →</button>
    <button class="btn btn-red" onclick="endQuiz()" style="margin-left:auto;font-size:11px">Terminer</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results"></div>

</div><!-- /container -->

<script>
// ════════════════════════════════════════════════════════
//  QUESTIONS — 4 quizzes × 40 questions = 160 total
//  Format: { q, opts:[...], ans:[], multi:bool, exp, domain, sub }
//  ans = array of correct indices (0-based)
// ════════════════════════════════════════════════════════

const QUIZZES = [

// ── QUIZ 1 ──────────────────────────────────────────────
{
title: "Quiz 1 — Concepts & Encryption",
desc: "Sécurité des concepts fondamentaux, cryptographie, PKI, TLS, chiffrement des e-mails et du stockage.",
questions: [
{q:"Quel terme décrit le fait qu'une information n'a pas été modifiée de manière non autorisée ?",opts:["Confidentialité","Disponibilité","Intégrité","Non-répudiation"],ans:[2],exp:"L'intégrité garantit que les données restent exactes et non altérées. La confidentialité protège contre les accès non autorisés, la disponibilité assure l'accès légitime, et la non-répudiation empêche de nier une action.",domain:"021",sub:"021.1"},
{q:"Lequel des acteurs suivants désigne une personne cherchant à améliorer la sécurité d'un système avec l'autorisation du propriétaire ?",opts:["Black hat","Script kiddie","White hat","Cracker"],ans:[2],exp:"Un 'white hat' (chapeau blanc) est un hacker éthique qui teste les systèmes avec autorisation pour améliorer leur sécurité.",domain:"021",sub:"021.1"},
{q:"Qu'est-ce qu'un CVE (Common Vulnerabilities and Exposures) ?",opts:["Un outil d'audit réseau","Un identifiant standard pour les vulnérabilités connues","Un protocole de chiffrement","Un type de firewall"],ans:[1],exp:"CVE est un système de référencement public qui attribue un identifiant unique à chaque vulnérabilité logicielle connue, facilitant le partage d'informations entre la communauté sécurité.",domain:"021",sub:"021.2"},
{q:"Dans un contexte de gestion des risques, que signifie 'atténuation du risque' ?",opts:["Ignorer le risque faute de budget","Transférer entièrement le risque à un tiers","Réduire la probabilité ou l'impact d'un risque","Accepter le risque sans action"],ans:[2],exp:"L'atténuation (mitigation) consiste à mettre en place des mesures qui réduisent soit la probabilité d'occurrence du risque, soit son impact potentiel.",domain:"021",sub:"021.2"},
{q:"Quelle obligation éthique s'applique lorsqu'un chercheur découvre une vulnérabilité dans un logiciel tiers ?",opts:["La publier immédiatement sur les réseaux sociaux","La vendre au plus offrant","Pratiquer la divulgation responsable en notifiant le fournisseur","L'exploiter pour démontrer sa dangerosité"],ans:[2],exp:"La divulgation responsable (responsible disclosure) consiste à informer le fournisseur en privé, lui laisser le temps de corriger, puis publier l'information. C'est la pratique éthique standard.",domain:"021",sub:"021.3"},
{q:"Quel algorithme de hachage est aujourd'hui considéré comme cryptographiquement cassé et ne doit plus être utilisé ?",opts:["SHA-256","SHA-3","MD5","bcrypt"],ans:[2],exp:"MD5 est vulnérable aux attaques par collision depuis 2004. Il ne doit plus être utilisé pour des fonctions de sécurité. SHA-256 et SHA-3 sont actuellement sûrs.",domain:"022",sub:"022.1"},
{q:"Qu'est-ce qu'une autorité de certification (CA) dans une PKI ?",opts:["Un serveur DNS sécurisé","Une entité de confiance qui émet et signe des certificats numériques","Un protocole de chiffrement asymétrique","Un pare-feu applicatif"],ans:[1],exp:"Une Certificate Authority (CA) est une entité de confiance dans une PKI qui vérifie l'identité des demandeurs et émet des certificats numériques signés avec sa clé privée.",domain:"022",sub:"022.1"},
{q:"Dans le chiffrement asymétrique, quelle clé est utilisée pour chiffrer un message destiné à un tiers ?",opts:["La clé privée du destinataire","La clé publique du destinataire","La clé privée de l'expéditeur","Une clé symétrique partagée"],ans:[1],exp:"Pour envoyer un message chiffré à quelqu'un, on utilise SA clé publique. Seule sa clé privée (qu'il garde secrète) permet de déchiffrer le message.",domain:"022",sub:"022.1"},
{q:"Que vérifie un navigateur web lors de l'établissement d'une connexion HTTPS ?",opts:["La vitesse du serveur","La validité et la confiance du certificat TLS du serveur","La présence d'un pare-feu applicatif","La version du système d'exploitation du serveur"],ans:[1],multi:false,exp:"Le navigateur vérifie que le certificat est signé par une CA de confiance, qu'il n'est pas expiré et que le nom du domaine correspond. C'est la base de la confiance HTTPS.",domain:"022",sub:"022.2"},
{q:"Laquelle de ces versions de TLS est considérée comme obsolète et non sécurisée ?",opts:["TLS 1.3","TLS 1.2","TLS 1.0","TLS 1.1"],ans:[2,3],multi:true,exp:"TLS 1.0 et TLS 1.1 sont officiellement dépréciés (RFC 8996, 2021) et ne doivent plus être utilisés. TLS 1.2 est encore acceptable, TLS 1.3 est le standard actuel.",domain:"022",sub:"022.2"},
{q:"Quel protocole permet d'envoyer des e-mails chiffrés de bout en bout sans infrastructure centralisée de clés ?",opts:["S/MIME avec PKI d'entreprise","OpenPGP / GnuPG","TLS SMTP uniquement","DKIM"],ans:[1],exp:"OpenPGP (implémenté par GnuPG) utilise un modèle de 'web of trust' décentralisé. S/MIME repose sur une PKI centralisée. TLS chiffre uniquement le transport, pas le contenu.",domain:"022",sub:"022.3"},
{q:"Quel outil Linux en ligne de commande est couramment utilisé pour chiffrer des fichiers avec OpenPGP ?",opts:["openssl enc","gpg","ssh-keygen","cryptsetup"],ans:[1],exp:"gpg (GNU Privacy Guard) est l'implémentation libre d'OpenPGP. Il permet de chiffrer, déchiffrer, signer et vérifier des fichiers et e-mails.",domain:"022",sub:"022.3"},
{q:"Quel mécanisme Linux permet de chiffrer intégralement une partition de disque ?",opts:["eCryptfs","LUKS (Linux Unified Key Setup)","AppArmor","dm-crypt seul sans LUKS"],ans:[1],exp:"LUKS est le standard de facto pour le chiffrement de partitions sous Linux. Il s'appuie sur dm-crypt mais ajoute une gestion des clés, des métadonnées et le support multi-utilisateurs.",domain:"022",sub:"022.4"},
{q:"Que signifie l'acronyme TPM dans le contexte de la sécurité matérielle ?",opts:["Trusted Platform Module","Terminal Port Manager","Transport Protocol Module","Timed Process Monitor"],ans:[0],exp:"Le TPM (Trusted Platform Module) est une puce dédiée à la sécurité qui stocke des clés cryptographiques, permet l'attestation d'intégrité du système et protège les secrets matériels.",domain:"023",sub:"023.1"},
{q:"Quel risque de sécurité est spécifiquement associé à la connexion de périphériques USB inconnus ?",opts:["Surtension électrique uniquement","Injection de clavier HID (BadUSB) et introduction de malware","Panne du contrôleur USB","Incompatibilité de pilotes uniquement"],ans:[1],exp:"L'attaque BadUSB exploite le fait qu'un périphérique USB peut se reprogrammer pour se faire passer pour un clavier et injecter des commandes malveillantes. Les malwares peuvent aussi se propager via USB.",domain:"023",sub:"023.1"},
{q:"Parmi les types de malware suivants, lequel se propage automatiquement à d'autres systèmes sans action de l'utilisateur ?",opts:["Cheval de Troie (Trojan)","Ver (Worm)","Spyware","Adware"],ans:[1],exp:"Un ver (worm) se propage de façon autonome en exploitant des vulnérabilités réseau. Un trojan nécessite une exécution par l'utilisateur. Un spyware surveille sans se propager.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce qu'un ransomware ?",opts:["Un logiciel qui affiche des publicités non désirées","Un malware qui chiffre les données de la victime et exige une rançon","Un programme qui vole des mots de passe","Un rootkit dissimulé dans le BIOS"],ans:[1],exp:"Le ransomware chiffre les fichiers de la victime et demande une rançon (souvent en cryptomonnaie) pour fournir la clé de déchiffrement. C'est l'une des menaces les plus coûteuses aujourd'hui.",domain:"023",sub:"023.3"},
{q:"Qu'est-ce que la règle de sauvegarde 3-2-1 ?",opts:["3 sauvegardes hebdomadaires, 2 mensuelles, 1 annuelle","3 copies des données, sur 2 supports différents, dont 1 hors site","Sauvegarder toutes les 3h, 2 fois par jour, 1 fois la nuit","3 disques en RAID 2, avec 1 sauvegarde"],ans:[1],exp:"La règle 3-2-1 est une bonne pratique universelle : 3 copies des données, sur 2 types de supports différents (ex: disque et cloud), dont au moins 1 copie hors site pour résister aux catastrophes physiques.",domain:"023",sub:"023.4"},
{q:"Quelle commande Linux permet d'afficher les connexions réseau actives et les ports en écoute ?",opts:["ifconfig -a","ss -tuln","route -n","ip link show"],ans:[1],exp:"'ss -tuln' affiche les sockets TCP (-t) et UDP (-u) en mode listening (-l) sans résolution DNS (-n). 'netstat -tuln' est l'équivalent historique, mais ss est l'outil moderne recommandé.",domain:"024",sub:"024.1"},
{q:"Qu'est-ce qu'un VPN (Virtual Private Network) ?",opts:["Un réseau local sans fil sécurisé","Un tunnel chiffré permettant de connecter des réseaux ou utilisateurs distants de façon sécurisée","Un protocole de routage BGP sécurisé","Un pare-feu de nouvelle génération"],ans:[1],exp:"Un VPN crée un tunnel chiffré entre l'utilisateur et un serveur distant, protégeant les communications sur des réseaux non fiables et permettant d'accéder à des ressources d'entreprise à distance.",domain:"024",sub:"024.1"},
{q:"Quel type d'attaque consiste à inonder un service de requêtes pour le rendre indisponible ?",opts:["Man-in-the-Middle (MitM)","SQL Injection","Denial of Service (DoS) / DDoS","Phishing"],ans:[2],exp:"Une attaque DoS/DDoS vise la disponibilité en saturant un service ou réseau. DDoS (Distributed) utilise de multiples sources coordonnées (botnet) pour amplifier l'attaque.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce qu'un pare-feu de type 'stateful inspection' ?",opts:["Un firewall qui inspecte uniquement les en-têtes IP","Un firewall qui maintient une table d'état des connexions pour autoriser le trafic de retour légitime","Un proxy applicatif au niveau 7","Un IDS basé sur les signatures"],ans:[1],exp:"Un firewall à inspection stateful suit l'état des connexions TCP/UDP. Il permet automatiquement le trafic retour d'une connexion établie depuis l'intérieur, contrairement à un filtre statique.",domain:"024",sub:"024.2"},
{q:"Quel protocole TOR utilise-t-il pour assurer l'anonymat des communications ?",opts:["Chiffrement de bout en bout avec une seule clé","Onion routing : chiffrement en couches multiples via des relais","VPN traditionnel avec masquage IP","Proxy HTTP transparent"],ans:[1],exp:"TOR utilise l'onion routing : les données sont chiffrées en plusieurs couches, chaque relais ne connaissant que le relai précédent et suivant. Aucun nœud ne connaît à la fois la source et la destination.",domain:"024",sub:"024.3"},
{q:"Qu'est-ce que l'authentification à deux facteurs (2FA) ?",opts:["Utiliser deux mots de passe différents","Combiner deux facteurs d'authentification de catégories différentes","Chiffrer deux fois les données","Utiliser deux algorithmes de hachage"],ans:[1],exp:"Le 2FA combine deux facteurs de catégories distinctes : quelque chose que vous savez (mot de passe), possédez (token, téléphone) ou êtes (biométrie). Deux mots de passe ne constituent pas un 2FA.",domain:"025",sub:"025.1"},
{q:"Quelle est la principale vulnérabilité d'un mot de passe réutilisé sur plusieurs services ?",opts:["Le hachage est plus facile à casser","Si un service est compromis, tous les autres comptes sont exposés (credential stuffing)","Le mot de passe expire plus vite","La synchronisation réseau est ralentie"],ans:[1],exp:"Le credential stuffing exploite les mots de passe volés sur un site pour les tester sur d'autres. La réutilisation multiplie l'impact d'une compromission unique.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce que le phishing ?",opts:["Une attaque réseau par force brute","Une technique d'ingénierie sociale visant à tromper l'utilisateur pour obtenir ses identifiants","Un type de malware se propageant par e-mail","Une injection de code dans une page web"],ans:[1],exp:"Le phishing est une attaque d'ingénierie sociale : l'attaquant usurpe une identité de confiance (banque, service en ligne) pour inciter la victime à divulguer ses identifiants ou cliquer sur un lien malveillant.",domain:"025",sub:"025.2"},
{q:"Qu'est-ce qu'une fuite de données (data leak) ?",opts:["Un bug de mémoire dans un programme","La divulgation non autorisée d'informations sensibles vers l'extérieur","Un type d'attaque DDoS","Une corruption de système de fichiers"],ans:[1],exp:"Une fuite de données est la divulgation non autorisée d'informations confidentielles. Elle peut résulter d'une attaque externe, d'une négligence interne ou d'une mauvaise configuration.",domain:"025",sub:"025.2"},
{q:"Quel droit fondamental est reconnu par le RGPD (GDPR) en matière de protection des données ?",opts:["Le droit de surveiller les employés sans limite","Le droit à l'oubli (effacement des données personnelles)","L'obligation de tout stocker pendant 10 ans","L'exemption des PME de toute obligation"],ans:[1],exp:"Le RGPD consacre plusieurs droits : accès, rectification, effacement (droit à l'oubli), portabilité, opposition. Ces droits s'appliquent aux données personnelles des citoyens européens.",domain:"025",sub:"025.3"},
{q:"Lequel de ces éléments constitue une donnée personnelle au sens du RGPD ?",opts:["Le nom d'un logiciel open source","L'adresse IP d'un utilisateur identifiable","La documentation technique d'un serveur","Le numéro de version d'un OS"],ans:[1],exp:"Une adresse IP peut identifier une personne physique et constitue donc une donnée personnelle au sens du RGPD. Toute information permettant d'identifier directement ou indirectement une personne est concernée.",domain:"025",sub:"025.3"},
{q:"Quel est le rôle d'un certificat racine (root CA certificate) dans une PKI ?",opts:["Chiffrer les données en transit","Servir d'ancre de confiance à partir de laquelle toute la chaîne de certification est validée","Gérer les révocations en temps réel","Générer les paires de clés des utilisateurs"],ans:[1],exp:"Le certificat racine est au sommet de la hiérarchie PKI. Il est auto-signé et préinstallé dans les navigateurs/OS. Toute la chaîne de confiance (CA intermédiaires → certificats serveurs) remonte à lui.",domain:"022",sub:"022.1"},
{q:"Que permet la liste de révocation de certificats (CRL) dans une PKI ?",opts:["D'accélérer le chiffrement TLS","De lister les certificats qui ont été révoqués avant leur date d'expiration","De générer de nouveaux certificats","De chiffrer les échanges entre CA"],ans:[1],exp:"Une CRL publie la liste des certificats révoqués (compromis, mauvais usage…) avant leur expiration. Le protocole OCSP est une alternative plus moderne permettant une vérification en temps réel.",domain:"022",sub:"022.1"},
{q:"Quel algorithme de chiffrement symétrique est le standard actuel recommandé pour le chiffrement de fichiers ?",opts:["DES (Data Encryption Standard)","3DES","AES (Advanced Encryption Standard)","RC4"],ans:[2],exp:"AES est le standard de chiffrement symétrique depuis 2001 (NIST). DES et 3DES sont obsolètes. RC4 est cassé. AES-256 est la version recommandée pour une sécurité maximale.",domain:"022",sub:"022.1"},
{q:"Quelle attaque exploite la prise de contrôle d'une communication entre deux parties à leur insu ?",opts:["DoS","SQL Injection","Man-in-the-Middle (MitM)","Ransomware"],ans:[2],exp:"L'attaque MitM place l'attaquant entre deux parties communicantes, lui permettant d'intercepter, lire ou modifier les échanges. HTTPS/TLS, la vérification de certificats et les VPN protègent contre cette menace.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce qu'un rootkit ?",opts:["Un script de configuration du compte root","Un malware conçu pour dissimuler sa présence et celle d'autres logiciels malveillants sur un système","Un outil d'administration légitime sous Linux","Un type de ransomware chiffrant uniquement /root"],ans:[1],exp:"Un rootkit s'installe profondément dans le système (parfois au niveau kernel) pour masquer des processus, fichiers ou connexions malveillants. Sa détection est particulièrement difficile.",domain:"023",sub:"023.3"},
{q:"Parmi les bonnes pratiques suivantes, lesquelles réduisent la surface d'attaque d'un système Linux ?",opts:["Désactiver les services inutiles","Utiliser le compte root pour toutes les opérations quotidiennes","Appliquer régulièrement les mises à jour de sécurité","Ouvrir tous les ports pour faciliter la connectivité"],ans:[0,2],multi:true,exp:"Réduire la surface d'attaque implique de désactiver les services non nécessaires (moins de vecteurs d'attaque) et d'appliquer les correctifs de sécurité (moins de vulnérabilités exploitables). L'utilisation de root et l'ouverture de ports sont des pratiques à éviter.",domain:"023",sub:"023.2"},
{q:"Qu'est-ce que le chiffrement de bout en bout (E2EE) ?",opts:["Un chiffrement appliqué uniquement sur le serveur de destination","Un chiffrement où seuls l'émetteur et le destinataire peuvent lire le message","Le protocole TLS entre deux serveurs","Le chiffrement du disque dur du serveur"],ans:[1],exp:"E2EE garantit que les messages sont chiffrés côté client et ne peuvent être déchiffrés que par le destinataire final. Ni les serveurs intermédiaires ni les fournisseurs de service n'ont accès au contenu.",domain:"024",sub:"024.3"},
{q:"Que signifie 'principe du moindre privilège' en sécurité ?",opts:["Tout utilisateur doit avoir les droits administrateur par défaut","Chaque utilisateur ou processus ne doit avoir que les droits strictement nécessaires à sa fonction","Les droits sont gérés uniquement par le pare-feu","Les privilèges doivent être distribués équitablement entre tous les utilisateurs"],ans:[1],exp:"Le principe du moindre privilège (Principle of Least Privilege) limite les droits au strict nécessaire, réduisant l'impact d'une compromission. C'est un principe fondamental de sécurité des systèmes.",domain:"023",sub:"023.2"},
{q:"Quel outil permet de gérer et stocker des mots de passe de façon sécurisée ?",opts:["Un fichier texte chiffré avec rot13","Un gestionnaire de mots de passe (KeePass, Bitwarden, etc.)","Le fichier /etc/passwd","Le navigateur web sans master password"],ans:[1],exp:"Un gestionnaire de mots de passe chiffre tous vos identifiants avec une clé maître forte. Il permet d'utiliser des mots de passe uniques et complexes pour chaque service sans les mémoriser.",domain:"025",sub:"025.1"},
{q:"Lequel de ces protocoles assure un transfert de fichiers chiffré, en remplacement de FTP ?",opts:["FTP over SSL (FTPS) et SFTP sont tous deux acceptables","Telnet","TFTP","rsh"],ans:[0],exp:"FTPS (FTP over TLS) et SFTP (SSH File Transfer Protocol) chiffrent le transfert de fichiers. FTP, Telnet, TFTP et rsh transmettent les données (et souvent les mots de passe) en clair.",domain:"024",sub:"024.1"},
{q:"Quelle technique de sécurité réseau permet de segmenter le réseau en zones isolées pour limiter la propagation d'attaques ?",opts:["Network Address Translation (NAT)","VLAN et segmentation réseau","Bridge réseau","Agrégation de liens (bonding)"],ans:[1],exp:"La segmentation réseau via VLANs crée des zones isolées (DMZ, LAN, serveurs…). Si une zone est compromise, l'attaquant ne peut pas facilement accéder aux autres, limitant le mouvement latéral.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que le HTTPS Strict Transport Security (HSTS) ?",opts:["Un protocole de cache web","Un mécanisme forçant les navigateurs à n'utiliser que HTTPS pour un domaine","Un type de certificat auto-signé","Un outil d'analyse de trafic réseau"],ans:[1],exp:"HSTS (RFC 6797) est un en-tête HTTP indiquant au navigateur de n'accéder au site qu'en HTTPS, même si l'utilisateur tape http://. Il protège contre les attaques de downgrade et le SSL stripping.",domain:"022",sub:"022.2"},
]
},

// ── QUIZ 2 ──────────────────────────────────────────────
{
title: "Quiz 2 — Réseau, Identité & Privacy",
desc: "Protocoles réseau, services, chiffrement réseau, anonymisation, identité, authentification, protection de la vie privée.",
questions: [
{q:"Quel port TCP est utilisé par défaut par le protocole SSH ?",opts:["21","22","23","443"],ans:[1],exp:"SSH utilise le port 22/TCP par défaut. Le port 21 est FTP, le 23 est Telnet (non chiffré), et le 443 est HTTPS.",domain:"024",sub:"024.1"},
{q:"Qu'est-ce qu'un enregistrement DNSSEC permet de garantir ?",opts:["La confidentialité des réponses DNS","L'intégrité et l'authenticité des réponses DNS","La vitesse de résolution DNS","L'anonymat des requêtes DNS"],ans:[1],exp:"DNSSEC (DNS Security Extensions) signe cryptographiquement les réponses DNS pour garantir leur intégrité et authenticité, protégeant contre l'empoisonnement de cache DNS (cache poisoning).",domain:"024",sub:"024.2"},
{q:"Lequel de ces protocoles chiffre les requêtes DNS pour protéger la vie privée ?",opts:["DNS classique (port 53)","DNSSEC","DNS over TLS (DoT) ou DNS over HTTPS (DoH)","MDNS"],ans:[2],exp:"DoT (port 853) et DoH (port 443) chiffrent les requêtes DNS, empêchant l'écoute et la modification. DNS classique et DNSSEC ne chiffrent pas le contenu des échanges.",domain:"024",sub:"024.3"},
{q:"Qu'est-ce qu'une attaque par déni de service distribuée (DDoS) ?",opts:["Une attaque menée par un seul hôte contre un serveur","Une attaque coordonnée depuis de multiples sources (botnet) visant à saturer un service","Un scan de ports distribué","Une attaque MitM sur plusieurs connexions simultanées"],ans:[1],exp:"Un DDoS utilise des milliers à millions de machines compromises (botnet) pour générer un trafic massif vers la cible, la rendant inaccessible. L'aspect distribué rend le blocage difficile.",domain:"024",sub:"024.2"},
{q:"Quel protocole fournit un tunnel chiffré pour sécuriser n'importe quel protocole TCP/IP ?",opts:["IPsec","SSH tunneling","HTTP CONNECT","Tous les précédents peuvent être utilisés"],ans:[3],multi:false,exp:"IPsec, SSH tunneling et HTTP CONNECT peuvent tous créer des tunnels sécurisés. SSH est particulièrement polyvalent pour le port forwarding. IPsec opère au niveau réseau (couche 3).",domain:"024",sub:"024.3"},
{q:"Qu'est-ce que l'usurpation d'identité (identity theft) en contexte numérique ?",opts:["La création d'un faux profil sur les réseaux sociaux uniquement","L'utilisation frauduleuse des informations personnelles d'une personne à son insu","Un type d'attaque réseau par spoofing d'adresse MAC","Une erreur de configuration d'annuaire LDAP"],ans:[1],exp:"L'usurpation d'identité numérique consiste à utiliser les données personnelles (nom, numéro de sécurité sociale, données bancaires…) d'une victime pour commettre des fraudes ou accéder à des services.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce que l'authentification sans mot de passe basée sur FIDO2/WebAuthn ?",opts:["Une connexion utilisant uniquement un code SMS","Un standard d'authentification forte utilisant des clés cryptographiques matérielles ou biométriques","Un protocole de mot de passe à usage unique (OTP)","Une connexion via réseau social (OAuth)"],ans:[1],exp:"FIDO2/WebAuthn utilise la cryptographie asymétrique : une clé privée stockée sur l'appareil ou clé matérielle (YubiKey) s'associe à une clé publique sur le serveur. Résistant au phishing car les clés sont liées au domaine.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce qu'une attaque par force brute sur un mot de passe ?",opts:["L'exploitation d'une vulnérabilité logicielle connue","L'essai systématique de toutes les combinaisons possibles jusqu'à trouver le bon mot de passe","L'interception du hash de mot de passe en réseau","Le décodage d'un mot de passe via une table arc-en-ciel"],ans:[1],exp:"Une attaque brute force teste exhaustivement les combinaisons. Pour la ralentir : mots de passe longs, verrouillage de compte, hash adaptatif (bcrypt, Argon2). Les tables arc-en-ciel sont une attaque distincte.",domain:"025",sub:"025.1"},
{q:"Quel protocole est utilisé pour l'authentification centralisée dans les environnements Linux d'entreprise ?",opts:["NFS v4","LDAP avec Kerberos (ou Active Directory)","SNMP v3","DHCP"],ans:[1],exp:"LDAP fournit l'annuaire d'utilisateurs, Kerberos fournit l'authentification par tickets. L'Active Directory de Microsoft combine les deux. C'est la base de l'authentification centralisée en entreprise.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce qu'un cookie de session web et quel risque principal présente-t-il ?",opts:["Un fichier de configuration du serveur web","Un identifiant stocké côté client permettant de maintenir une session ; risque de vol (session hijacking)","Un cache de pages web ; risque de contenu obsolète","Un certificat client ; risque d'expiration"],ans:[1],exp:"Les cookies de session identifient l'utilisateur auprès du serveur. S'ils sont volés (via XSS, sniffing), l'attaquant peut usurper la session. Les attributs Secure et HttpOnly réduisent ce risque.",domain:"025",sub:"025.2"},
{q:"Que signifie 'minimisation des données' dans le contexte du RGPD ?",opts:["Compresser les données pour réduire leur taille","Ne collecter que les données strictement nécessaires à la finalité déclarée","Anonymiser toutes les données après 30 jours","Chiffrer les données au minimum avec AES-128"],ans:[1],exp:"La minimisation des données (RGPD art. 5) impose de ne collecter que les données adéquates, pertinentes et limitées à ce qui est nécessaire. Collecter des données 'au cas où' est contraire au RGPD.",domain:"025",sub:"025.3"},
{q:"Quel attribut d'un cookie HTTP empêche son accès via JavaScript (protection XSS) ?",opts:["Secure","SameSite","HttpOnly","Path=/"],ans:[2],exp:"L'attribut HttpOnly empêche l'accès au cookie via document.cookie en JavaScript, limitant les attaques XSS visant le vol de session. L'attribut Secure empêche la transmission sur HTTP non chiffré.",domain:"025",sub:"025.2"},
{q:"Quelle technique d'anonymisation remplace les données personnelles par des valeurs irréversibles ?",opts:["Pseudonymisation","Chiffrement","Anonymisation irréversible (hashing sans sel, agrégation)","Tokenisation réversible"],ans:[2],exp:"L'anonymisation irréversible (hash sans sel ou agrégation statistique) empêche toute réidentification. La pseudonymisation et la tokenisation sont réversibles et ne constituent pas une anonymisation complète.",domain:"025",sub:"025.3"},
{q:"Lequel de ces éléments est considéré comme un facteur d'authentification de type 'possession' ?",opts:["Mot de passe","Empreinte digitale","Token matériel (YubiKey, Google Titan)","Code PIN"],ans:[2],exp:"Les facteurs d'authentification : savoir (mot de passe, PIN), posséder (token physique, téléphone), être (biométrie). Un YubiKey est un facteur de possession. L'empreinte digitale est un facteur d'inhérence (biométrie).",domain:"025",sub:"025.1"},
{q:"Quelle est la différence principale entre un IDS et un IPS ?",opts:["L'IDS est matériel, l'IPS est logiciel","L'IDS détecte et alerte, l'IPS détecte et bloque activement les menaces","L'IDS fonctionne en réseau, l'IPS uniquement sur l'hôte","L'IDS analyse les logs, l'IPS analyse le trafic en temps réel"],ans:[1],exp:"IDS (Intrusion Detection System) détecte et alerte les administrateurs. IPS (Intrusion Prevention System) va plus loin en bloquant automatiquement le trafic malveillant. Les deux peuvent être réseau (NIDS/NIPS) ou hôte (HIDS/HIPS).",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que le scan de ports avec nmap permet de réaliser ?",opts:["Identifier les ports ouverts et services en écoute sur un hôte cible","Chiffrer les communications réseau","Configurer les règles de pare-feu","Analyser le contenu des paquets HTTP"],ans:[0],exp:"nmap est un scanner réseau permettant de détecter les ports ouverts, services actifs, versions logicielles et parfois le système d'exploitation d'un hôte. Essentiel en audit de sécurité et pentest.",domain:"024",sub:"024.1"},
{q:"Quel mécanisme de sécurité empêche un serveur web malveillant de charger des ressources depuis d'autres origines ?",opts:["CORS (Cross-Origin Resource Sharing)","CSP (Content Security Policy)","HSTS","X-Frame-Options"],ans:[1],exp:"La Content Security Policy (CSP) est un en-tête HTTP permettant au serveur de définir les sources de contenu autorisées (scripts, images, styles), réduisant les risques XSS et injection de contenu.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce qu'une DMZ (Demilitarized Zone) dans une architecture réseau ?",opts:["Un réseau WiFi invité non sécurisé","Une zone réseau isolée hébergeant les services exposés à Internet, séparée du réseau interne","Un segment réseau réservé aux administrateurs","Un VPN inter-sites"],ans:[1],exp:"La DMZ est une zone tampon entre Internet et le réseau interne. Les serveurs web, mail, DNS publics y sont placés. Si compromis, l'attaquant est isolé du réseau interne par un firewall.",domain:"024",sub:"024.2"},
{q:"Que fait la commande 'iptables -A INPUT -p tcp --dport 22 -j ACCEPT' ?",opts:["Bloque le port SSH","Autorise les connexions entrantes sur le port 22 (SSH)","Redirige le port 22 vers un autre port","Supprime toutes les règles de la chaîne INPUT"],ans:[1],exp:"Cette règle iptables ajoute (-A) à la chaîne INPUT une règle autorisant (-j ACCEPT) les paquets TCP (-p tcp) destinés au port 22 (--dport 22). C'est la règle de base pour autoriser SSH.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que le protocole HTTPS garantit-il lors d'une connexion à un site web ?",opts:["L'anonymat complet de l'utilisateur","L'authentification du serveur, la confidentialité et l'intégrité des données échangées","La vitesse de la connexion","Que le contenu du site est sûr et légitime"],ans:[1],exp:"HTTPS (HTTP over TLS) garantit : authentification du serveur (certificat), confidentialité (chiffrement) et intégrité (protection contre la modification). Il ne garantit pas l'anonymat ni la légitimité du contenu.",domain:"022",sub:"022.2"},
{q:"Quel type d'attaque consiste à insérer du code SQL malveillant dans un formulaire web ?",opts:["XSS (Cross-Site Scripting)","SQL Injection","CSRF (Cross-Site Request Forgery)","Path Traversal"],ans:[1],exp:"L'injection SQL exploite une mauvaise validation des entrées pour injecter des requêtes SQL arbitraires, pouvant donner accès à la base de données. Prévention : requêtes préparées, ORM, validation des entrées.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que le principe de 'sécurité par l'obscurité' et pourquoi est-il insuffisant ?",opts:["C'est une méthode de chiffrement basée sur des algorithmes secrets ; elle est insuffisante car les algorithmes secrets ne sont pas auditables","Il suffit de cacher les informations de configuration ; insuffisant car des techniques d'énumération peuvent les révéler","C'est un standard NIST reconnu comme seule protection nécessaire","C'est une bonne pratique recommandée par l'ISO 27001"],ans:[0],exp:"La sécurité par l'obscurité cache les mécanismes de sécurité plutôt que de les renforcer. Elle est insuffisante car un attaquant déterminé peut découvrir les secrets, et elle ne résiste pas à une analyse approfondie. Elle peut compléter mais jamais remplacer une vraie sécurité.",domain:"021",sub:"021.1"},
{q:"Qu'est-ce que la stéganographie ?",opts:["Un algorithme de chiffrement asymétrique","L'art de dissimuler un message dans un autre fichier (image, audio) de façon imperceptible","Un protocole de transfert de fichiers sécurisé","Une technique de compression de données"],ans:[1],exp:"La stéganographie dissimule l'existence même d'un message (contrairement à la cryptographie qui le rend illisible). Par exemple, cacher des données dans les pixels d'une image.",domain:"022",sub:"022.1"},
{q:"Quelles bonnes pratiques s'appliquent aux mots de passe selon les recommandations actuelles du NIST ?",opts:["Forcer le changement de mot de passe tous les 30 jours","Utiliser des mots de passe longs (passphrase) et éviter les changements forcés réguliers","Limiter les mots de passe à 8 caractères pour faciliter la mémorisation","Interdire les caractères spéciaux pour éviter les injections"],ans:[1],multi:false,exp:"Le NIST SP 800-63B (2020) recommande des mots de passe longs (16+ chars), n'exige plus de changement périodique forcé (contre-productif), recommande la vérification contre les dictionnaires de mots de passe compromis.",domain:"025",sub:"025.1"},
{q:"Qu'est-ce qu'une attaque de type 'social engineering' ?",opts:["Une attaque exploitant des failles logicielles","Une manipulation psychologique visant à tromper des individus pour obtenir des informations ou accès","Une attaque réseau automatisée par botnet","Une injection de code dans les réseaux sociaux"],ans:[1],exp:"L'ingénierie sociale manipule des personnes (pas des systèmes) pour obtenir des informations sensibles ou des accès. Exemples : phishing, vishing (téléphone), pretexting (fausse identité), baiting (USB infectée).",domain:"021",sub:"021.1"},
{q:"Qu'est-ce que TOTP (Time-based One-Time Password) ?",opts:["Un mot de passe permanent généré par un serveur d'authentification","Un code à usage unique généré à partir d'une clé secrète et de l'heure courante","Un token matériel USB pour l'authentification","Un protocole de chiffrement des SMS"],ans:[1],exp:"TOTP (RFC 6238) génère un code à 6 chiffres toutes les 30 secondes à partir d'un secret partagé et du timestamp. Utilisé par les applications 2FA (Google Authenticator, Authy). L'heure synchronisée est critique.",domain:"025",sub:"025.1"},
{q:"Quel risque présente le Wi-Fi public non chiffré ?",opts:["Une consommation batterie excessive","L'interception du trafic par n'importe qui sur le même réseau (sniffing)","Une vitesse de connexion réduite","Des frais d'itinérance supplémentaires"],ans:[1],exp:"Sur un réseau WiFi ouvert, tout le trafic non chiffré est lisible par les autres participants. Un attaquant peut capturer identifiants, cookies de session, etc. L'utilisation d'un VPN ou HTTPS est indispensable.",domain:"024",sub:"024.2"},
{q:"Qu'est-ce que le Certificate Transparency (CT) ?",opts:["Un protocole de révocation de certificats","Un journal public et auditable de tous les certificats TLS émis par les CA","Un algorithme de vérification de chaîne de certification","Un type de certificat pour le code signing"],ans:[1],exp:"Certificate Transparency (RFC 6962) est un système de journaux publics où toutes les CA doivent enregistrer les certificats émis. Cela permet de détecter des certificats frauduleux ou mal émis.",domain:"022",sub:"022.2"},
{q:"Que signifie 'pen test' (test de pénétration) ?",opts:["Tester les performances d'un réseau sous charge","Un audit de sécurité autorisé simulant des attaques réelles pour identifier des vulnérabilités","Scanner les logs système à la recherche d'erreurs","Installer des patchs de sécurité sur les serveurs"],ans:[1],exp:"Un pentest est une évaluation de sécurité mandatée où des experts (ethical hackers) tentent de compromettre des systèmes avec les mêmes techniques qu'un attaquant, mais dans un cadre légal et contractuel.",domain:"021",sub:"021.2"},
{q:"Qu'est-ce que la non-répudiation en sécurité informatique ?",opts:["La capacité de chiffrer des messages de façon indéchiffrable","La garantie qu'un acteur ne peut nier avoir effectué une action (signature électronique)","Le principe d'interdire toute action non autorisée","La redondance des systèmes pour éviter les pannes"],ans:[1],exp:"La non-répudiation garantit qu'un expéditeur ne peut nier avoir envoyé un message ou effectué une transaction. Elle s'implémente via les signatures numériques (clé privée unique à l'expéditeur).",domain:"021",sub:"021.1"},
{q:"Quel outil Linux permet d'analyser les logs d'authentification pour détecter des tentatives d'intrusion ?",opts:["df -h","grep / journalctl / fail2ban","ps aux","lsof"],ans:[1],exp:"On examine /var/log/auth.log ou journalctl pour les tentatives SSH. fail2ban automatise le blocage des IP après N échecs. C'est un outil essentiel de surveillance de sécurité.",domain:"021",sub:"021.2"},
{q:"Qu'est-ce qu'une politique de sécurité des informations (ISMS) au sens de l'ISO 27001 ?",opts:["Un antivirus d'entreprise","Un ensemble de politiques, procédures et contrôles gérant systématiquement la sécurité de l'information","Un pare-feu de nouvelle génération certifié ISO","Un scanner de vulnérabilités certifié"],ans:[1],exp:"Un ISMS (Information Security Management System) selon ISO 27001 est un cadre organisationnel complet : politiques, gestion des risques, contrôles techniques et organisationnels, audit continu.",domain:"021",sub:"021.2"},
{q:"Quel protocole est recommandé pour sécuriser les e-mails en transit entre serveurs de messagerie ?",opts:["SMTP en clair (port 25)","SMTP over TLS / STARTTLS (port 587)","POP3 non chiffré","HTTP"],ans:[1],exp:"STARTTLS sur le port 587 (submission) ou 465 (SMTPS) chiffre les e-mails en transit. Sans TLS, les e-mails transitent en clair et peuvent être interceptés. SPF, DKIM et DMARC complètent la sécurité SMTP.",domain:"022",sub:"022.3"},
{q:"Qu'est-ce que DKIM (DomainKeys Identified Mail) ?",opts:["Un filtre anti-spam basé sur liste noire","Un mécanisme de signature cryptographique des e-mails sortants permettant de vérifier l'authenticité de l'expéditeur","Un protocole de chiffrement des e-mails de bout en bout","Un standard de chiffrement du stockage des e-mails"],ans:[1],exp:"DKIM ajoute une signature numérique aux e-mails sortants. Le destinataire vérifie via un enregistrement DNS TXT. Combiné à SPF et DMARC, il lutte contre le spoofing d'e-mails.",domain:"022",sub:"022.3"},
{q:"Quel est l'objectif principal d'un backup immutable (immuable) ?",opts:["Accélérer les sauvegardes","Empêcher la modification ou la suppression des sauvegardes, notamment par un ransomware","Réduire l'espace disque utilisé","Permettre l'accès partagé aux sauvegardes"],ans:[1],exp:"Un backup immuable (WORM - Write Once Read Many) ne peut être modifié ni supprimé pendant une période définie. C'est une protection cruciale contre les ransomwares qui ciblent désormais les sauvegardes.",domain:"023",sub:"023.4"},
{q:"Qu'est-ce qu'un honeypot en sécurité ?",opts:["Un container Docker isolé pour les tests","Un système leurre conçu pour attirer et détecter les attaquants","Un outil de hachage de fichiers","Un pare-feu applicatif web"],ans:[1],exp:"Un honeypot est un système délibérément vulnérable (mais isolé) destiné à attirer les attaquants. Il permet de les détecter, étudier leurs techniques et collecter des indicateurs de compromission.",domain:"021",sub:"021.2"},
{q:"Laquelle de ces pratiques constitue une menace de type 'insider threat' ?",opts:["Un attaquant externe exploitant une vulnérabilité CVE","Un employé exfiltrant des données confidentielles de l'entreprise","Un botnet attaquant depuis Internet","Un scan de ports depuis une IP étrangère"],ans:[1],exp:"Une menace interne (insider threat) provient de personnes ayant un accès légitime : employés, ex-employés, sous-traitants. Elle peut être malveillante (vol de données) ou accidentelle (erreur de configuration).",domain:"021",sub:"021.1"},
]
